body:
  text: 左傳附注卷五明陸粲撰陸博士釋文黃公紹曰經傳自陸氏定為釋文學者執以為據然於音切實有未辨有字同義同音同而援引數家反切者有字同義同而前後異音自相抵牾者今案近世字書有一字數音互見諸韻紛然殽亂其原皆起於釋文若一一駮正則不勝其煩今於諸字有兩音乃至三四音而前一音義勝或皆通者則不復論其有謬誤抵牾亦但於初一處説之觀者觸類可以意求春秋序檮杌檮徒刀反楊用修曰左傳有檮戭人名史龜䇿傳上有檮著漢書檮余山名諸書檮字皆音稠獨檮杌音陶乃陸氏之誤據杜注檮杌凶頑無儔匹貌則亦當音儔為例為于偽反又如字如字是長之長丁丈反長當為展兩反説見下數句數色主反數所具反後凡言數人數里數圻數月數年數世數百年數十乘之類皆倣此膚引膚方于反膚方無反素王王于况反王如字中興中丁仲反案中衷二字作去聲者並陟仲反釋文皆作丁仲反毛晃以此譏其誤黃公紹乃云丁一音爭詩伐木丁丁是也與陟仲反音正同然反切本為指迷以爭為丁難以喻後學矣即如斯言則斷音丁亂嫡音丁歷此丁字亦當讀為爭乎斯實當時方音之訛而黃氏特傅會其説耳此類今並隨字正之包包必交反包班交反之防防扶放反又音房音房是注姪娣姪直結反字林丈乙反僖十五年傳姪其從姑音待結反是也今世讀者皆從字林之音注為經為于偽反後凡為經為傳張本起本例皆放此為並讀如字隱公元年注長三丈髙一丈長直亮反又如字髙古報反又如字度長曰長度髙曰髙則依二反此伹舉其數則如字讀是也哀元年廣丈髙倍與此同參國參七南反又音三音三是昭三年參其力與此同難之難乃旦反案杜注云難言其奔宜如字讀注通稱稱尺證反當為蚩承反凡稱舉稱謂之稱本作稱經典多借作稱音蚩承反尚書稱爾戈論語君稱之此傳稱兵稱盟稱君稱臣之類是也稱適稱副之稱則尺證反禮記既稟稱事史他物稱是無以報稱此傳以稱旌繁之類是也今字書多以稱謂字為尺證反實踵釋文之誤如黃公紹直謂平聲讀者為非其繆甚矣玉篇釋此字云齒證切遂也齒稜切讃也得之矣敗宋敗必邁反敗他也顔之推曰江南學士讀左傳軍自敗曰敗打破人軍曰敗補敗反諸傳記未見有此此為穿鑿爾今案如顔説則敗有兩音本亦非古其云補敗反即此必邁反也依古音當如字讀公孫猾猾于八反又乎八反乎八反是也二年以薑氏還還音旋還讀如字户關反後皆同三年筐筥錡釡筐丘方反錡其綺反筐曲方反錡魚綺反注之比比必二反比一讀如字為勝漢書食貨志法比顔監注比則例也亦有兩音五年辨等列辨如字又方免反别也辨平免反注巡行下孟反案行字下孟反者言迹也本非巡行之義自釋文誤為此音又於傳中如行火行築者行東野及注文行夜履行之類通作下孟反而後來為字書者皆因之不悟其非也此等宜皆讀如字作下庚反衛牧牧州牧之牧徐音目牧目同音何煩别異六年信矣信如字一音申丘光庭曰信當為屈伸之伸則此一音是也請糴糴直歷反莊二十八年糴音徒歷反是也七年如忘忘亡亮反服虔云如而也如忘並依字讀注為鄭忽為于偽反為如字後凡言為某年某事傳為書某事例者並放此八年注近許近附近之近毛晃曰凡逺近之近上聲指其定體也附近之近去聲親也近之也今案此近許當為逺近之近後皆放此九年軼我軼直結反軼徒結反若作直結反則為轍矣後此如衰絰之絰更迭之迭其誤並同戎輕輕遣政反輕猶楚師輕宨之輕依字讀足得無勞改音衷戎衷丁仲反通典引此文衷音竹仲反是也注駐軍駐丁住反襄二十五年駐音張住反是也十年以勞勞力報反勞郎到反十一年莵裘菟兔都反菟大胡反桓公二年鞶厲鞶步千反鞶蒲官反分親分扶問反又如字親七刃反又如字案杜注云以親踈為分别則分親皆如字讀三年驂絓絓户卦反成二年驂絓一音卦是也五年子免免音問喪冠音問此大子名疑讀如字萃於萃似類反萃在醉反注夏正正音征正如字六年隨張張豬亮反一音如字張猶張公室之張音如字是也蠡蠡力果反蠡魯果反周人以諱事神名終將諱之周人以諱事神名絶句衆家多以名字屬下句名字屬下句為是言此名者終將必諱之故欲其易避難犯也八年弟緡緡亡巾反緡眉貧反景祐集韻云字之翻切舊以武代某以亡代茫謂之類隔今皆用本字毛晃俞琰亦謂陸氏釋文以亡巾反旻天之旻為非今案此傳釋文諸翻切如以慢為武諫牟為亡侯之類甚多又如以辨為方免辟為扶亦摽為敷蕭亦類隔之意也皆當以本字正之後不悉舉九年衡陳衡如字一音橫音橫是十三年見楚子見賢遍反案相見之見經甸反著見之見賢遍反釋文於傳注中不復區别一從賢遍之音非是此見楚子宜音經甸反以後凡求見請見得見見之不見之類皆放此注難言難乃旦反難如字好鎮好呼報反又如字如字是盡行盡津忍反此類可以意求盡音在忍反者悉也此年盡行昭二年周禮盡在魯之類是也音津忍反者俗作儘極也任也盡之也文十四年盡其家之類是也釋文槩音津忍反非是毛晃韻於子忍反下注云皆也亦誤俞文豹曰陸氏以扞格之格作户格反以告朔為梏朔惠鮮為惠蘚孫謀為遜謀三省三復三思三接之三皆息暫反雖自有意義要不若如字讀為平易至以盡心盡力盡禮盡善盡美皆作儘尤礙理惟虛坐盡後食坐盡前宜如是讀耳十六年注構會會古外反會黃外反合也十七年復惡復扶又反一音服則乖注意音服為是不乖注意十八年謫之謫直革反又丁革反謫陟革反莊公元年注父弒弒本亦作殺音弒作殺為是宜如字讀桓公為齊人所殺不得言弒也六年立衷衷丁仲反王音忠音衷是後凡言衷者皆放此噬齊齊粗兮反齊前西反八年間公間如字或古莧反非作古莧反亦是一義謂若為之間謀然也襄二十五年為崔子間公同貝丘貝補蓋反貝補昧反十年三鼓三息暫反又如字如字是也後皆放此十一年注之難難乃旦反難如字十四年注盤庚盤步丹反盤蒲官反十九年強諌強其丈反僖二年強諫音其良反是也二十一年西辟辟蒲歷反服虔云西辟西偏也宜音匹亦反二十二年招我以弓弓音姑𢎞反讀如肱下與朋韻協或謂朋音如蓬繆矣詩小戎虎韔鏤膺交韔二弓竹閔緄縢又閟宫朱英緑縢二矛重弓弓皆與膺縢協是其例也二十四年共也司馬溫公訓儉文援此語曰共同也言有德者皆由儉來也孫奕據此語讀為恭者非更詳之二十七年將飢飢居疑反又音機居疑即機之反切重言非也文十六年大飢音飢一音機其誤亦同釋文中此類甚多後亦不復煩舉二十八年注廣一尺廣古曠反廣音古晃反後如廣里廣丈之類並放此注長尋長直亮反長如字三十二年注肄也肄音四又以二反以二反是其音四者乃肆字耳説文肄作習也肆作肆極陳也今字書肄肆或相亂閔公元年霸王王于況反王如字二年使守守手又反古音惟太守之守或讀如狩又巡狩字亦作守餘並依字讀今釋文於傳中守字多音手又反非也注能逺逺于萬反逺于願反朝夕朝如字又張遙反朝旦之朝本字也朝覲之朝借用也此云如字即張遙反不當重説也文十三年傳繞朝音與此同皆誤僖公元年分災分甫問反又如字曲禮分毋求多釋文音扶問反是也二年注抄晉抄初教反又楚稍反楚稍反是也説文作鈔四年乘而乘繩證反乘如字卓子卓吐濁反卓讀如字辨焉辨兵免反辨平免反五年遂登觀臺以望而書禮也臺以望絶句而書絶句均服均如字周禮黼純鄭司農云純讀均服之均依其説則均當音準蓋傳讀之異之旗劉攽曰司馬溫公論九旗之名旗與旗相近緩急何以區别詩夜向晨言觀其旗左傳龍尾伏晨取虢之旗以此驗之旗當為芹音周人語轉為旗耳亦如關中以中為蒸音為萋也今案説文旗從斤得聲當為芹無疑後人音渠希切非也六年衰絰絰直結反十五年衰絰音大結反是也七年疵瑕疵似斯反又疾移反疵才咨反九年注釗釗古堯反又音昭音昭是十四年背施施式䜴反注及下施毛同施毛之施讀如字十五年注中女中丁仲反中直衆反後言中子中男之類皆放此責言責側介反又如字如字是先君之敗德及可數乎先君之敗德及絶句一讀及可數乎一讀是十七年注公子潘潘判丹反潘鋪官反十八年不勝勝音升又升證反升證反是二十二年注近也近如字又附近之近附近之近是也二十三年委質質如字質音致説見前卷曹共公聞其駢脅欲觀其裸浴薄而觀之欲觀絶句一讀至裸字絶句祼力果反薄如字國語注云薄簾也一讀是也祼魯果反薄從國語舊注則如字若依杜解薄為迫則當音博注湔也江南有濽子旦切山東言湔子見反通俗文旁沾曰湔説文汙灑也二十四年注質信質音致質讀如字成十一年傳齊盟以質信也注畏為為于偽反為如字鄂不不方九反不今逋骨反二十五年注掘地掘其勿反又其月反其勿當作渠勿其月當作渠月二十七年貫三人耳貫音官又古亂反古亂反是二十八年棺棺古患反一音官當作古玩反然音官義亦自足糾逖逖敕歷反逖他歷反俞琰曰閩音以敕為惕今案釋文凡他惕二字多作敕信其為方音之訛也祁瞞瞞莫干反瞞莫官反為解解户賣反又古買反古買反是舍此舍音捨舍或音釋禮釋菜作舍菜古字通此云舍此三者文六年傳臾駢曰釋此三者其義一也三十二年悖心悖必內反毛晃曰陸德明釋文顔師古注漢書悖並音布內反皆誤惟韻略作蒲昧反是今案此必內反與布內反一也集韻以悖入背字下蓋亦踵釋文之誤三十三年奉我奉扶用反奉古音扶勇反今俗讀皆扶用反文公二年注藻梲梲章悅反梲音拙朱劣反轅選選息兖反選須兖反三年嘉樂嘉户嫁反樂如字嘉詩作假毛傳云假嘉也此傳及中庸引詩作嘉孔疏並云嘉美宜讀如字樂音洛襄二十六年嘉樂與此同五年沈漸漸似亷反漸慈亷反今書作潛六年殄瘁瘁似醉反襄二十六年殄瘁音在醉反是也十年強死強其丈反孔疏云強健也無病而死依其説則強讀如字十一年注其處處昌吕反處昌慮反十二年未憗憗魚覲反又魚轄反注云憗缺也疏云今人猶謂缺為憗蓋與齾同音則魚轄反是也郭忠怒曰憗有牛吝五八二翻俗别為憗薄諸河薄蒲莫反薄音博孫奕讀十三年注劉纍纍劣彼反纍魯水反十五年注率多率所類反率朔律反下率其屬同注等差差初佳反又初宜反初宜反是相畏相息亮反又如字如字是十六年蚡冒冒莫報反史記楚世家注冒一音亡北反注傳車傳丁戀反成五年以傳音中戀反是也宣公二年犀兕兕徐履反成十四年兕觥音辭姊反是也盛服盛音成盛時正反注蔭翳蔭音隂又於鴆反於鴆反是四年汰輈汰他末反昭二十六年汰輈音他逹反是也六年其貫貫古患反貫古亂反説見前卷十一年注行也行下孟反行如字復封復扶又反復如字十二年勦民勦初交反徐子小反徐音是初交反者勦説之勦也字同而義則異矣注旌識識申志反又音志音志是申志反非也漢書劉向傳不可不識顔師古音式志反誤與此同注無強強居良反注言成無強之業者蓋言莫強乎武王之業也強其良反楚重注重輜重也重直勇反又直用反注上重字同重也直用反三重字一義並音直用反號申叔號徐户到反一音戶刀反呼也凡號呼之號户刀反號令號召之號户到反此號申叔當從户刀反為是襄十九年號之同十三年我説注以説我説如字又音悅以説音悅又如字二説字一也互音秪為煩猥十四年宋聾聾力工反僖二十四年聾音鹿工反是也窒皇窒直結反案疏云窒皇與莊十九年絰皇義同宜如彼音田結反十六年折爼折之設反程大昌曰折當音舌言破碎也其義良是十八年注解緩解佳買反解下買反成公二年繁纓繁步干反繁蒲官反哀二十三年旌繁同推車推昌誰反又他回反他回反是後言推之推而下之親推之之類皆放此若之何其以病敗君之大事也病字絶句病字連下為句辟女子辟音避一音扶亦反辟與闢通下五年傳辟重同周禮閽人為辟釋文音婢亦反是也注難斥言難乃旦反難如字四王之王也五伯之霸也楊用修曰王如字下王音旺上伯字入聲下霸字去聲注竟也竟如字又音境音境是而爭爭爭鬬之爭爭音諍説見後自為為于偽反又如字如字是三年鄤鄤亡袁反又莫干反鄤謨官反八年注差也差初賣反又初佳反初佳反是妃耦耦苦口反當作五口反君後後如字徐音胡豆反徐音是九年重勤重直勇反又直用反直用反是浹辰浹子協反徐音子答反徐音是浹猶匝也淮南子注從子至亥為一匝今俗語猶如此十二年好惡好惡並如字又上呼報反下烏路反依後二反義勝襄十一年同為民為于偽反又如字如字是十四年敗焉敗必邁反敗焉以自敗為文宜讀如字不內內如字徐音納徐音是後凡言弗內內之者皆放此酌飲酌市略反又張略反張略反是義與勺通十六年覆之覆徐敷目反一音扶又反一音是復從從徐子容反或如字如字是輕窕窕勑雕反又勑弔反窕他雕反又他弔反注喧譁譁本又作譁音華譁呼爪反折軾折之設反又市列反市列反是後凡折軫折股折肱折其齒之類皆放此以伯伯如字又音霸音霸是食粟食舊如字對上句應作嗣音如字是十七年祝宗祝之又反祝之六反十八年以間間如字又間厠之間間厠之間是也台谷台勑才反台他來反襄公二年注復憂復扶又反下文將復復會同將復之復音扶目反孟子有復於王注復白也三年為諂諂他檢反當作敕檢反禮食食音嗣又如字如字是四年間陳注間缺間陳間厠之間注間音間又間厠之間又如字二間一義並音間厠之間五年覿鄫覿直歷反覿徒歷反私積積子賜反積資昔反九年積聚同七年後衛君後如字徐胡豆反上注文臣後君音胡豆反又云下文不後寡君同此後字既無異義而獨音如字一簡之中頓相乖違良所未曉八年悉索索悉各反一音所百反一音是説見前卷九年出內內如字徐音納徐音是薑曰亡亡如字讀者或音無如字不成義理音無是也以爭爭爭鬬之爭又如字凡爭鬬之爭本字也平聲諌爭之爭借用也去聲今云爭鬬又云如字未詳十年上者三三息暫反又如字如字是著雍著徐都慮反都當為諸字之誤也霍人史記樊噲傳自霍人以往張守節云霍人當作葰人地理志葰人縣屬太原郡葰音瑣又山寡反十三年難其難乃旦反或如字如字是不習則增修德而改卜不習則增絶句一本無增字則連下為句有增字亦連下為句若云不習則增斯於文義難通矣釋文之意但取上文祥習則行行與增韻協故強斷之非也十四年注中分中丁仲反又如字如字是庾公差差初佳反徐初宜反孟子作庾公斯斯差聲相近徐音近是羔袖袖一本又作褎在又反袖似又反古字作褎一本是也十五年易淫樂易以䜴反輕也傳云以千乘之相易淫樂之矇猶言以五男易一女矣當為更易之易音羊益反十八年必斾斾步蓋反斾步昧反脫歸脫敕括反脫他活反蟲牢牢力刀反二十三年牢成音魯刀反是也十九年仰膏雨焉若嘗膏之膏雨如字徐古報反膏之古報反又如字二膏一也皆讀如字傳食食音嗣食如字工僂僂力侯反僂郎侯反蹶蹶其月反一音居月反當從居月反昭二十三年推而蹶之一音厥是也漢書賈誼傳蹶六國蘇林亦音厥二十一年注弒殺殺申志反又如字申志反則亦當讀如弒於文為重宜如字讀二十三年知不集知音智又如字如字是注閉著著陟略反别本作直略反是也二十四年薳啓強強其良反又居良反居良反是古字強與疆通顔師古匡繆正俗云案買誼新書衛侯朝于周周行人問其名曰辟強周行人曰啓強辟強天子之號也諸侯弗得用如賈生此説辟當音開闢之闢強當音疆場之疆楚有薳啓強即其例也今案賈説本於韓非子見外儲説右篇注閲數閲音決桓六年大閲音悅是也二十五年處守注守國處守手又反守國如字或手又反二守一義而異音非也纍纍類悲反纍倫追反町町徒頂反町他頂反跳此跳直雕反跳徒雕反二十六年頷之頷户感反頷五感反其音户感反者腮也面黃也雩婁婁如字如淳音樓婁樓同音釋文於婁字皆音力侯反其讀近留故與樓異獨僖十八年訾婁音郎鈎反是也為請為于偽反又如字如字是二十七年難之難乃旦反難之及下難吾助女並如字夫能夫如字或音扶音扶是垂隴隴力勇反隴魯勇反二十八年注之宿音秀釋名曰宿宿也星各止宿其處也馬永卿曰二十八宿謂之二十八舍又謂之二十八次次舍皆有止宿之意今乃音秀此何理也洪邁曰宿當讀如本音説苑辨物篇云二十八星謂之宿者日月五星之所宿也其義昭然惡之惡如字一音烏路反一音是洎洎共器反字林已蒞反史記武紀水而洎之徐廣音居器反與字林音同是也注著崔著丁略反著直略反二十九年注以思思息嗣反下憂思同思並如字樂而樂音嶽又音洛下而又何樂可以樂倣此樂並音洛其與與如字或音預與音歟語辭昭元年同能紓紓直吕反徐音舒徐音是三十年愎愎彼力反僖二十八年注剛愎此上二十八年夫子愎並音皮逼反是也三十一年諄諄諄徐之閏反或一音之純反一音是徐音非也朝夕朝直遙反舊如字如字是棣棣棣本又作逮直待反棣徒戴反昭公元年注誹也誹芳畏反誹妃尾反注之收收手又反又如字如字義通不煩改音是難難乃旦反難如字注當身當丁浪反當如字姺邳邳字或作妚姓苑作娝音鄙一音可否之否常棣棣直計反常棣大計反已見僖二十四年櫜甲櫜本或作衷丁隆反衷陟隆反從兄從如字又才用反才用反是蔡蔡叔上蔡字音素葛反定四年蔡蔡叔音素逹反是也造舟造七報反造才早反説見前卷注日景景如字又於領反於領反是即古影字也葛洪加彡愒日愒苦蓋反愒去例反説見前卷惡之惡如字又烏路反烏路反是注思慮思息利反思如字新兹反三年為此為于偽反為如字數於數所具反徐所主反徐音是説見前卷四年不殆殆直改反殆蕩亥反紂作紂直救反當作直九反觀於觀古亂反又如字如字是注叔孫婼婼敕略反婼徐邈讀曰釋公羊傳作叔孫舍古字釋與舍通徐音近之又案漢書婼羌音而遮反疑此婼字音亦當如之而舍則音捨舍婼聲亦相近也五年思莫思息吏反一音如字一音是遺守遺唯季反遺夷佳反餘也鵲岸岸五旦反岸五亂反馮怒馮皮冰反莊子賅逆於馮氣釋文云馮音憤憤滿也與此不同六年採樵樵似遙反桓十二年採樵音在遙反是也七年數紂數色具反又色主反色主反是惡之惡之如字或烏路反非也烏路反是説見前間晉間如字間晉當音間厠之間僖三十年及文七年皆有蕞爾蕞在最反蕞徂最反八年注大數數色主反數所具反九年戎焉焉於虔反又如字如字是水妃妃方非反一音配下注妃合音配則此亦同音太玄注引傳作火水也古妃字注勸樂樂如字又五教反一音洛音洛是十年靈姑銔銔扶眉反又音丕音丕是注自勝勝音升勝升證反十一年注棄捐捐以專反捐余專反注復於復扶又反復如字著定著張慮反徐治居反漢書五行志引此文顔音直庶反十二年塴禮家作窆徐驗反義同俞琰以徐驗反為誤今案僖三十二年注殯窆棺也釋文音彼驗反此徐字即彼字文相近而訛耳又周禮鄭注謂窆讀如慶封汜祭之汜深思思息嗣反思如字供養供九用反養餘亮反供居容反養以兩反疏云供給長養之是也杞乎杞音紀杞音起潘子潘普干反潘鋪官反八索索所白反索依賈逵張衡説則昔各反孔安國説則所白反未知孰是十五年逺於逺于萬反又如字如字義勝十六年之難難乃旦反又如字如字是惡識惡烏路反惡音烏十七年注鶻雕雕陟交反又陟留反又音雕雕字誤爾雅郭璞注引杜此注又作鶻鵃陟留反是也其與與如字又音預與音歟語辭十九年注贛榆贛古弄反如淳音耿弇反漢書地理志贛榆顔注贛音紺是也二十年與乘與音預又如字如字是注阿比也比音毗至反疥遂痁疥舊音戒梁元帝音該字當作痎兩日一發之瘧也後學之徒僉以疥字為誤案傳例因事曰遂若痎已是瘧疾何為復言遂痁乎顔之推曰説文痎二日一發之瘧痁有熱瘧也齊侯之病本是間日一發後漸加重遂頻日熱發也今北方猶呼痎瘧音皆而世間傳本多以痎為疥俗儒就為通云病疥令人惡寒變而成瘧此臆説也疥癬小疾寧有轉作瘧乎今案孔疏引梁人袁押之説亦謂疥當為痎又素問云夏傷於署秋為痎瘧注云痎老瘧也二十一年可藉死而不能送亡君請待之而不能送亡君絶句送亡絶句君字屬下説見前卷二十二年説之説如字又音悅音悅是説見前卷注欲位一本位作立作立是也注北芒芒音亡芒音忙説文作邙二十三年蹶之蹶其月反又音厥音厥是二十四年陽不克莫將積聚也陽不克莫絶句據杜注云陽氣莫然不動乃將積聚莫字似宜屬下邵文莊公曰陽不克句莫自為句乘舟乘繩證反又如字如字是二十五年外野案此謠辭通章皆韻野字當叶音上與反讀如墅詩魯頌駉駉牡馬在坰之野其用韻與此同又楚詞霾兩輪兮縶四馬云云嚴殺盡兮棄原壄壄古野字乾侯侯音胡與踈襦叶饔人檀檀直丹反又市戰反檀徒丹反郈孫以可勸郈孫以可絶句勸勸公逐季氏也郈孫以可勸為句注日冥冥亡定反冥暗也音茗二十六年不勝衆勝音升又始證反始證反是施之施如字又始䜴反始䜴反是二十八年注逆著著中略反一音直略反一音是塢臧塢舊烏戶反又音偃案地名在周者烏户反隱十一年塢留是也在鄭者音偃成十六年戰于鄢陵是也在楚者於建反又音偃昭十三年王沿夏將入鄢是也在晉者於庶反太原有塢縣唯周地者從烏餘皆從焉傳云司馬彌牟為塢大夫即太原縣也塢臧宜以邑為氏於庶反舊音誤塢之與鄢字體既别其音亦殊比而論之徒為煩亂且既云太原有塢縣矣又云唯周地者從烏餘皆從焉自相乖違良非後學所曉忿纇纇立對反纇盧對反三十年徴過徴直升反杜注云徴明也義與襄二十八年徴過義略同宜如彼音張陵反三十一年裸裸力果反裸魯果反三十二年注知費費芳貴反當作芳味反定公二年敲之敲苦孝反又苦學反一曰口交反口交反是三年償馬償市亮反償音常僖十五年傳不可償也彼文協韻則音市亮反於此自宜讀如字四年復怒復扶又反復音服八年注異強強其丈反強如字捘捘子對反毛晃曰陸音誤當作祖寸反咋咋仕詐反咋側嫁反又側格反説見前卷注得脫脫徒活反又他活反他活反是九年注雖説説音悅説如字注若麟麟吕辛反哀十四年獲麟音力珍反是也注所樂樂如字又五孝反樂音洛曩者之難今又難焉難乃旦反難並如字言曩者登城固難今相擊又難也十年凶懼凶音凶一音凶勇反凶勇反是迋迋求往反又古況反古況反是十五年多取多讀如祗適也古祗字或作㩼省作多襄二十九年傳祗見疏也正義之説備矣哀公元年注壘厚厚户豆反厚胡口反二年謀協以故兆詢可也謀協以故兆絶句謀協句以故兆屬下朴馬朴普卜反朴匹角反麇麇丘隕反注言麇束縛也當音苦隕反字書或作麕麇其丘隕反者羣也昭五年傳求諸侯而麇至是已非束縳之義六年差車差所宜反差又宜反七年後宋後如字又户豆反户豆反是不樂樂音嶽一音洛音洛是八年三遷三息暫反三如字十一年注别其田别如字一音彼列反彼列反是也下十二年注具列其月以為别與此同十四年要我要於妙反又一遙反一遙反是注難以難乃旦反下文及注同難歟下文難子之難義異此宜讀如字十五年寡君敢辭上介芋尹蓋對寡君敢辭上介絶句敢辭絶句上介屬下杜注云蓋陳大夫貞子上介其意自明使之使所吏反又如字如字是十六年夫有夫方于反或音扶音扶義勝十七年求令名者而與之始食焉求令名者絶句求令名者而與之始食焉為句衷甸甸時證反説文作佃云中也依説文當音徒練反塞竇竇音豆竇與窬通音臾説見前卷二十一年不覺覺音角又古孝反古孝反與下蹈韻協是也二十三年注涿聚涿丁角反二十七年涿聚音中角反是也二十四年躗言躗户快反字林作寱于例反躗于嵗反説文亦作寱或作讆三倉于劌切謊言也二十五年注屈肘肘女九反肘陟栁反從孫甥從如字又才用反才用反是二十六年注子黚黚起亷反黚其淹反史記作黔左傳附注卷五

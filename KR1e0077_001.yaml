body:
  text: 左傳附注卷一明陸粲撰杜氏集解隱公元年莊公寤生寐寤而莊公已生史記寤生生之難或説云難産困而後寤也又應劭風俗通云兒墮地能開目視者為寤生與杜義乖録之示不絶異説耳弔生不及哀諸侯已上既葬則縗麻除無哭位諒暗終喪此説於經典未之前聞杜於晉朝元皇后喪議太子應既葬除服援此傳文及鄭伯辭享景王宴樂為證先儒譏其巧飾經傳以附人情今以傳考之所謂弔生不及哀者蓋言惠公薨久今來賵不及其哀哭方盛之時耳至如子産為鄭伯辭享直云免喪聽命傳亦但言葬鄭簡公杜何由知其定為既葬而除也叔向譏景王明言三年之喪雖貴遂服禮也乃謂其譏宴樂而不譏除服可乎杜既創為此議故於傳中諸言喪禮與已説不合者輒遷就解釋以求通如文元年傳曰晉襄公既祥注云諸侯雖諒暗亦因祥祭為位而哭昭十年傳葬晉平公叔向辭諸侯之大夫曰孤斬焉在衰絰之中注云既葬未卒哭故猶服斬衰十五年傳叔向譏景王下亦云天子諸侯除喪當在卒哭今王既葬而除故譏其不遂此服自與前所議乖違蓋雖委曲生意秪益顯其謬耳孔疏乃云卒哭與葬相去非逺卒哭是葬之餘事故杜云然其黨於所習而為之護飾短闕抑又甚矣三年四月鄭祭足帥師取溫之麥秋又取成周之禾四月今二月也秋今之夏也麥禾皆未熟言取者蓋芟踐之傳本采舊史為文不皆齊同先儒謂其間有雜用夏正者此類是也杜云芟踐特強説耳澗溪沼沚之毛溪亦澗也爾雅説文皆云山夾水澗山瀆無所通溪是澗溪異也蘋蘩蕰藻之菜蕰藻聚藻也毛晃謂蕰亦水草名據傳文上云澗溪沼沚下云筐筥錡釡皆以四物成文毛説良是小加大小國而加兵於大國如息侯伐鄭之比小加大疑亦以班位上下言之不必專謂加兵四年敝邑以賦與陳蔡從言舉國之賦調論語何晏注賦兵賦也疏引服虔説云以田賦出兵故謂之兵賦今杜云賦調語省略耳五年天子用八八八六十四人諸侯用六六六三十六人大夫四四四十六人士二二二四人士有功賜用樂此説本何休公羊傳注宋元嘉中太常傅隆議云夫舞者所以節八音八音克諧然後成樂故必以八人為列自天子至士降殺以兩者減其二列爾杜預以為一列又減二人至士止餘四人豈復成樂據服虔注云天子八八諸侯六八大夫四八士二八其義為允今案士有功賜用樂斯語於禮經亦未有考對曰未及國忿公知而故問責窮辭責窮辭者蓋謂責以必窮之辭耳然此文晦澀或有脫誤六年長惡不悛從自及也悛止也昭三年傳注悛改也芟夷藴崇之藴積崇聚也藴崇皆積也徐鍇云積之髙曰崇八年胙之土報之以土周語胙以天下韋昭注胙祿也此云胙之土者謂祿之以土田爾杜每訓胙為報非也諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族或便即先人之諡稱以為族案鄭玄駮許慎五經異義引此傳文云諸侯以字為氏今此以氏作諡者傳寫訛也杜考之不詳乃妄斷其句而強解之公命以字為展氏諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏劉敞曰此説非也若無駭真公子展之孫當其繼大宗也賜氏久矣何待死而後賜之乎且禮云公孫之子以王父字為氏非謂死而後氏之也然則無駭固公孫羽父請族者為無駭之子請也若公孫之子死然後賜族則無駭為終身無氏矣今案劉説得之鄭樵氏族略云公子展之子曰公孫夷伯其孫曰展無駭此妄説也案僖十五年杜注夷伯展氏祖父孔疏謂不知其人故漫言耳樵獨何所據而知之又云魯孝公子四人惟展無字以名為氏其誕謾無稽甚矣九年乃可以逞逞解也林堯叟曰逞快也言可以快志於戎衷戎師戎前後及中三處受敵故曰衷戎師程俱曰衷猶衷甲之衷蓋言戎師為師所包也十一年不度德鄭莊賢鄭莊姦雄何賢之有此謂息侯之德自薄耳師出臧否亦如之滅而告敗勝而告克此皆互言不須兩告乃書此注當在後不書於策之下轉寫誤屬此桓公二年為賂故立華氏也督未死而賜族督之妄也趙子常曰傳稱華父督華父者是其字督公孫也無賜族之法今案此言立華氏蓋記者追書之辭若僖伯稱臧耳非未死賜族也孔父嘉為司馬嘉孔父字孔父其字嘉其名也據傳中言人名字皆先字後名如上華父督及後孟明視子越椒之屬皆是又古者孫以王父字為氏故嘉之後為孔氏五傳而至仲尼家語及闕里世系唐宰相表諸書所記皆同杜此注既誤疏因曲為通之云孔父先世以孔為氏父是其名斯謬甚矣即如所云世寧有獨以父為名者乎啖助曰孔字父美稱也其先皆以字連父故有弗父金父若孔為氏豈世世改乎又春秋時名嘉者多字孔是其證也藻率鞞鞛藻率以韋為之所以藉玉也王五采公侯伯三采子男二采鞞佩刀削上飾鞛下飾戴侗曰杜解藻率之義非也記曰率帶諸侯大夫皆五采士二采又曰士練帶率下辟凡帶有率無針功藻五采也藻率者以五采率帶也下云鞞鞛蓋與帶相屬今案戴説是也杜所云藉玉者自名繅藉但藻繅古字或相通鄭玄注周禮繅藉云讀為藻率之藻杜蓋誤會其意遂為此解也又案鞞刀室也鞛通作琫詩小雅鞞琫有珌毛傳云鞞容刀鞞也琫上飾珌下飾至大雅鞞琫容刀傳則云下曰鞞上曰琫已自小差今杜反之其誤滋甚孔疏乃云鞞鞛或上或下俱是無正文也斯欲掩杜之失而遷就其辭爾今滅德立違謂立華督違命之臣華督弒君矣何止違命國語韋注云違違道也又云違邪也武王克商遷九鼎于雒邑殷所受夏九鼎也義士猶或非之蓋伯夷之屬班史王貢傳云武王伐紂遷九鼎於雒邑伯夷叔齊薄之餓死於首陽不食其祿杜説殆本諸此孔疏不能援以為證而稱史記叩馬諫伐之語誤矣然班氏之説他無所見疑亦依放此傳為之杜云蓋伯夷之屬蓋者疑辭也趙與峕云陳同甫謂義士即尚書所謂頑民者由周而言則為頑民由商而言則為義士矣非謂伯夷之屬也周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德僖伯諫隱觀魚其子哀伯諫桓納鼎積善之家必有餘慶故曰其有後於魯內史但言臧孫達有後杜兼稱僖伯非傳意也嘉耦曰妃怨耦曰仇古之命也自古有此言命者名也漢書五行志引此傳文顔師古注云本自古昔而有此名是也又案説文引虞書云怨匹曰逑然則此古書之辭爾大夫有二宗適子為小宗次者為二宗以相輔二二宗即小宗蓋為大宗之二也或者大宗小宗各有族人為之别二因有斯號杜獨言小宗則非矣上文云卿置側室杜以為卿得立此一官孔疏因謂二宗亦官名今皆未有考也五年旝動而鼓旝旃也通帛為之蓋今大將之麾也執以為號令周禮司常通帛為旜旜與旃同爾雅因章曰旃注並不訓為旝説文旝建大木置石其上發機以磓敵也不引此傳文其説與杜不同孔疏以杜義為長然未見所出當考祭足祭足即祭仲之字蓋名仲字足也疏曰釋例云伯仲叔季固人字之常然古今亦有以為名者宰渠伯糾蕭叔大心皆以伯叔為名則仲亦名也案傳文此年先稱祭仲足十一年又稱祭封人仲足以前孔父嘉等相比則名足字仲明矣釋例所云杜之曲説也竊尋古記未有以伯仲叔季為名者所稱宰渠伯糾蓋渠伯其爵糾其名然先儒或以為字如何休公羊傳注云老臣不名宰渠伯糾是也若蕭叔則亦大心是名叔是字耳勞王且問左右言鄭志在苟免王討之非也劉敞曰此言不可以訓六年隨人使少師董成董正也文六年傳注董督也疏云督察之是也謂其不疾瘯蠡也皮毛無疥癬蠡字書亦作瘰云瘯瘰皮肥也此云疥癬或别有據親其九族九族謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子非已之同族皆外親有服而異族者也案鄭玄以九族為髙祖至玄孫孔氏不取然杜説謂皆外親而不數已之五屬亦未然當從戴歐陽父族四母族三妻族二之説其義亦見白虎通君子曰善自為謀言獨潔其身謀不及國此亦美鄭忽之辭非刺其謀不及國也自詩小序謂齊女賢而忽不取卒以無大國之助見逐諸儒説詩及春秋者皆踵此論昔之君子能辨其非矣忽之辭昏不為失䇿其曰自求多福在我而已足稱名言未可厚非也不以隱疾隱痛疾患辟不祥也鄭玄注曲禮云隱疾衣中之疾孔疏謂體上幽隱之處疾病是也戴章甫云為其名稱不雅耳非獨辟不祥也九年以戰而北北走也荀子遇敵處戰則必北楊倞曰北者乖背之名故以敗走為北説文北䓙也從二人相背顔師古曰北幽隂之處故退敗者謂之北於義亦通莊公四年且請為會於漢汭而還汭內也謂漢西疏曰莫敖與隨侯盟又請隨侯為會於漢水之汭而我還楚也隨侯畏之遂從莫敖為會會訖隨侯因濟漢還國而後發王喪也詩芮鞠之即毛傳云芮水崖也及鄭箋乃云芮之言內也杜蓋依用其説據傳言漢東之國隨為大若為會于漢西即楚師元未涉漢下文何得云濟漢而後發喪也孔疏順杜之失訓釋迂回與傳文戾矣閔二年渭汭注云水之隈曲曰汭是也十一年若之何不弔不為天所愍弔若之何不弔言如何可不相弔恤也襄十四年衛侯出奔魯使厚成叔弔曰聞君不撫社稷越在他竟若之何不弔其辭與此正同公右歂孫生搏之搏取也手擊曰搏十四年人之所忌其氣焰以取之妖由人興也尚書洛誥無若火始焰焰未盛而進退之時以喻人心不堅正顏師古云言人心之所忌惡其氣焰馴致於災此説是也杜引尚書之文於義迂矣十六年惠王立而復之惠王立在此年之末史記年表惠王元年當魯莊公十八年若凖踰年改元之例則惠王之立當在明年傳於此云立而復之者蓋終言之爾注謂此年之未誤也孔疏乃云杜與史記不違未詳其意十九年鬻拳可謂愛君矣言愛君明非臣法也疏曰何休膏肓云人臣以兵臨君開篡弒之路左氏以為愛君于義為短故杜言此以釋何休之難杜於左氏之失不能以義理規正而為飾説掩護若此者多矣昔人美元凱為丘明忠臣君子未之許也謂此類也夫二十二年弛於負擔弛去離也弛解也釋也翹翹車乘翹翹逺貌翹翹高貌詩云翹翹錯薪義亦取其高潔山嶽則配天物莫能兩大陳衰此其昌乎得大嶽之權則有配天之大功故知陳必衰言物不兩大陳衰則此乃昌耳非謂知陳必衰也二十四年女贄不過榛栗棗修以告虔也榛小栗修脯虔敬也皆取其名以示敬疏曰栗取其戰栗棗取其早起修取其自修惟榛無説蓋以榛聲近虔取其虔於事榛與栗異説文作亲云果實如小栗鄭玄注曲禮云似栗而小杜即以為小栗非也孔疏所稱四物名義特委巷之言耳其謂榛聲近虔尤謬二十五年夏六月辛未朔日有食之鼓用牲於社非常也非常鼓之月長厯推之辛未實七月朔置閠失所故致月錯昭十七年夏六月朔日食祝史請用幣平子禦之曰唯正月朔慝未作日有食之於是乎有伐鼓用幣其餘則否太史曰在此月也當夏四月是謂孟夏據彼文則此年六月日食而伐鼓用牲乃正其禮安得謂之非常也傳文先後乖異亦緣左氏采獲舊史既多不暇一一整比故致斯誤杜求其説而不可得乃云由置閠失所致月錯尋傳文如文元年閠三月非禮襄二十七年再失閏皆明著其失於此亦應顯譏置閏之誤不得僅云非常而已孔疏曰二十四年八月丁丑夫人薑氏入從彼推之則六月辛未朔非有差錯而杜云然者以二十四年八月以前誤置一閏非是八月以來始錯也斯亦傅會之論耳杜所造長厯置閠疏數無凖不依古法雖孔氏亦嘗譏之今此所云亦未足據信矣孔氏論長厯之誤見僖五年文元年疏中唯正月之朔慝未作正月夏之四月周之六月謂正陽之月沈括曰先儒以日食正陽之月止謂四月不然也正謂四月陽謂十月二者皆先王所惡四月純陽不欲為隂所侵十月純隂不欲過而干陽也蘇氏詩傳之説亦如此二十八年小戎子生夷吾小戎允姓之戎子女也傳稱允姓之姦居於瓜州自惠公始誘以來則獻公之時固未入中土何緣得薦女於晉假令有之然當時之戎自非一種亦安知此小戎必為允姓也據傳言大戎狐姬小戎子則此戎蓋子姓耳三十二年犖有力焉能投蓋於稷門蓋覆也稷門魯南城門走而自投接其屋之桷反覆門上此説恐未然劉炫謂投車蓋過於稷門者近是而孔氏不取更詳之閔公二年用其衷則佩之度衷中也佩玉者士君子常度劉奉世曰佩之使合法度也世子佩瑜玉而綦組綬今命以時卒閟其事也冬十二月閟盡之時閟閉也幽也言不章顯其事也是服也狂夫阻之阻疑也言雖狂夫猶知有疑此文難明杜注及孔疏所引服虔韋昭二説皆強解耳當闕以俟知者昔辛伯諗周桓公云內寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣驪姬為內寵二五為外寵奚齊為嬖子曲沃為大都故曰亂本成矣劉炫謂二五嬖賤不得為二政太子不以曲沃作亂不得為大都以此譏杜之誤今案古人援證前聞皆取其大致不必事事符同杜説誠太拘矣衛文公大布之衣大帛之冠大布粗布大帛厚繒蓋用諸侯諒暗之服此特言其儉朴耳何必是諒暗之服僖公元年公敗邾師于偃虛丘之戍將歸者也虛丘邾地邪人既送哀薑還齊齊人殺之因戍虛丘欲以侵魯公以義求齊齊送薑氏之喪邾人懼乃歸故公要而敗之此事始末不見于傳疏亦云杜説無據要其理當然也夫訓釋經傳貴在依文考實苟無所據寧存而不論爾詎可輒憑胸臆果於立説以疑誤後人乎杜注如此比者前後非一今不悉舉二年冀為不道入自顛軨伐鄍三門前是冀伐虞至鄍冀之既病則亦唯君故言虞報伐冀使病將欲假道故稱虞強以説其心疏曰服虔以為伐鄍三門謂冀伐晉也冀之既病則亦唯君故謂虞助晉也將欲假道故稱前恩以誘之今知不然者若虞嘗經助晉則是昔來通好何憂不許而進國之美寶尚畏宫之竒諫乎故杜以為冀自伐虞虞自報冀理必然也服説是也晉與虞雖嘗通好然越其境而伐人寧得肆然徑行謂無撓沮又不畏其忠臣諫乎故進國美寶且稱前恩以誘之揆諸當時事情自應爾耳若冀自伐虞虞自報冀則於晉何與而稱之斯理必不然矣四年君處北海寡人處南海唯是風馬牛不相及也馬牛風逸蓋末界之微事故以取喻馬永卿曰注意未明此乃醜詆之辭爾言齊楚相逺雖馬牛之風者猶不相及今汝人也而乃入吾地何也此風與書馬牛其風同意牝牡相誘謂之風賜我先君履東至于海西至于河南至于穆陵北至于無棣穆陵無棣皆齊竟履所踐履之界齊桓又因以自言其盛史記司馬貞注曰今淮南有故穆陵門是楚之竟無棣在遼西孤竹服虔以為太公受封竟界不然也蓋言其征伐所至之域林堯叟曰楚方問涉其地之故齊不應僅言受封竟界以自狹司馬氏之説近是昭王之不復君其問諸水濵昭王時漢非楚竟故不受罪言非我所知汝自往問水濱此亦嫚侮之辭耳筮短龜長不如從長物生而後有象象而後有滋滋而後有數龜象筮數故象長數短楊用修曰卜人云筮之辭理短龜之辭理長蓋就立驪姬一事言之而非謂筮龜有短長也杜言象長數短瞽説也孔穎逹云杜欲成卜人所言之意故引傳文證之若以至理而言筮龜實無長短此亦知杜之謬而不敢顯譏之耳專之渝攘公之羭渝變攘除羭美也言變乃除公之美攘猶攘羊之攘言專愛之則能使公心變而攘奪其所美也五年均服振振戎事上下同服漢書五行志引此文均作袀顔注袀服黑衣也蓋均袀古字通七年諸侯官受方物諸侯官司各於齊受其方所當貢天子之物趙子常曰此謂受所當貢伯主之物耳其後晉悼邢丘之會蓋放此為之今案齊語稱桓公知諸侯之歸已也使輕其幣而重其禮云云亦此意也九年以伯舅耋老七十曰耋此服虔王肅輩説也詩毛傳及説文釋名爾雅注皆云八十曰耋今計齊侯之年亦未應及此蓋方加優禮因過稱之以是藐諸孤言其幼賤與諸子懸藐太玄曰藐德靈徵失范望注藐小貌毛晃韻引此傳文亦云藐小也弱也杜以為藐逺之意非是君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也詩大雅言此言之缺難治甚於白圭荀息有焉有此詩人重言之義李德裕窮愁志云荀息許晉獻以言繼之以死君子猶歎斯言之玷不可為也司馬溫公亦云獻公廢長立少荀息不能明白理義格其非心而遽以死許之是其言玷於前而不可救於後左氏之志所以貶息而非褒也元凱之言失其指矣十四年虢射虢射惠公舅也疏曰晉語秦侵晉至於韓慶鄭曰君其訊射也公曰舅所病也是虢射為惠公舅也晉語韋昭注云諸侯謂異姓大夫曰舅然則通稱耳傳言小戎子生夷吾虢射既非戎人不得是惠公舅也十五年秦穆姬屬賈君焉賈君晉獻公次妃賈女也傳言晉獻公娶於賈則是正妃此云次妃蓋誤孔疏謂别有所見非也卜徒父筮之吉卜人而用筮不能通三易之占故據其所見雜占而言之劉炫曰成十六年筮卦遇復云南國蹙射其元王中厥目則筮法亦用雜占不必皆取易辭杜謂不能通三易之占非也三敗及韓晉侯車三壞三敗謂晉師與秦戰而敗也杜緣上文卜入之言遂以為車壞其説拘而陋矣亂氣狡憤狡戾也狡狂也入而未定列猶吾憂也列位也列師之伍列也晉侯自言能合其衆故秦伯以是復之我食吾言食消也案哀二十五年傳孟武伯惡郭重曰何肥也公曰是食言多矣能無肥乎然則食言者謂言而不行若自食之耳商書湯誓朕不食言蔡傳曰食言言已出而反吞之漢書胸奴傳注亦曰食言者終為不信棄其前言如食而盡也晉於是乎作爰田分公田之稅應入公者爰之於所賞之衆爰國語作轅注曰易也為易田之法以賞衆漢書地理志制轅田注曰周制田三年一易以同美惡食貨志所謂三歲更耕之自爰其處是也説文作􅧱徐鍇曰爰轅皆假借此乃正字謂以田相換易也其繇曰士刲羊亦無􅎺也女承筐亦無貺也周易歸妹上六爻辭也離為中女震為長男故稱士女此直論上六本爻之義未及於變卦也杜解當云兊為少女今言離為中女誤耳孔疏所謂不須變為離卦自有士女之義者得之而云此以離震雜説其理與易卦不同則謬矣姪其從姑震為木離為火火從木生離為震妹於火為姑謂我姪者我謂之姑謂子圉質秦既云離為火火從木生復云於火為姑未詳其義劉用熙曰震變為離是姪從姑之象此但取男女為姑姪非取長次義也史蘇是占勿從何益雖復不從史蘇不能益禍言雖不從史蘇之占亦何益矣明其無救於敗也此一役也言還惠公使諸侯咸服復可當一事之功服虔曰一役者謂韓戰之役也今尋傳文語脈其曰二而執之服而舍之云云此一役也秦可以霸實本韓戰而言服説是也杜強斷之而别為義謬矣二十一年貶食省用務穯勸分穯儉也既言省用矣不應重言務儉林堯叟謂以稼穯為務如漢貸民種食之類者是也外傳茂穯勸分韋注亦云茂勉稼穯以服事諸夏與諸夏同服王事以服事諸夏猶言以服事殷不必更云王事二十二年天維顯思思猶辭也先儒訓詁謂語助辭皆曰辭也此衍猶字乃傳寫誤大司馬固諫曰天之棄商久矣君將興之弗可赦也已大司馬固莊公孫公孫固也言君興天所棄必不可不如赦楚勿與戰案此稱大司馬下言司馬又言子魚實一人也史記世家亦以此為子魚之言晉語雖云文公過宋與司馬公孫固相善考世家猶在戰泓之後則此是子魚無疑也固諫者猶云固請固辭耳弗可赦也已言違天舉事必將獲罪弗可赦宥也從杜説則讀至弗可句絶而以赦也已自為句不成文理金鼓以聲氣也金鼓以佐士衆之聲氣丘光庭兼明書曰注當云金鼓以佐士衆之氣今云佐聲氣於文不順劉用熙曰聲宣也宣倡士卒之勇氣戎事不邇女器邇近也器物也言俘馘非近婦人之物依注所言是以俘馘為器與傳文不相應矣郭定襄曰言戎事尚嚴不近女子所御之器物況使婦人至軍中又示以俘馘乎此説是也二十三年䇿名委質二乃辟也名書於所臣之策屈膝而君事之則不可以二疏曰質形體也謂拜而屈膝委身體於地也質與贄通管子令諸侯之子將委質者皆以雙虎之皮晉語臣委質於翟之鼓韋注質贄也士贄以雉依杜説則質讀如字非也辟不敏也敏猶審也襄十四年有臣不敏注云敏達也吾觀晉公子之從者皆足以相國若以相若遂以為傅相傳文云若以相夫子必反其國當在夫子句絶晉語説此事云其從者皆國相也以相一人必得晉國用彼文相方其義益明奉匜沃盥既而揮之揮湔也揮非湔也疏曰蓋以濕手揮之使水湔汚其衣故云爾二十四年所不與舅氏同心者有如白水言與舅氏同心之明如此白水猶詩言謂余不信有如皎日疏曰諸言有如皆是誓辭有如日有如河有如白水言心之明白如日如水也有如上帝有如先君言上帝先君明見其心意亦同此程大昌曰詩云有如皎日言其志之明白也若晉文公之誓其語亦放乎詩而意則異焉蓋要質河神使司其約耳故史記改為之言曰若反國所不與子犯共者河伯視之斯得其指矣邵文莊公曰諸言有如日有如河有如上帝先君之類皆謂其神臨之必降之罰也弔二叔之不咸弔傷咸同也周公傷夏殷之叔世疏其親戚以至滅亡故廣封其兄弟疏曰鄭衆賈逵皆以二叔為管蔡傷其不和睦而流言作亂鄭玄詩箋亦然案其封建之中方有管蔡豈傷其作亂始封建之乎馬融以為夏殷叔世故杜同之郭定襄曰以二叔為夏殷其義迂矣原富辰之意重在親親所云二叔正謂管蔡下文復列之者自為數文武之昭穆故耳古人立文正不若是拘也今案此説得之咸諴通和也召穆公思周德之不類故糾合宗族于成周而作詩周厲王之時周德衰微兄弟道缺召穆公于東都收會宗族特作此周公之樂歌詩小序云常棣燕兄弟也閔管蔡之失道故作常棣焉外傳亦以為周文公之詩而此云召穆公所傳異耳杜此注本之韋昭韋云周文公之詩者周公旦所作其後周室既衰親親禮廢召穆公復修作常棣之歌以親之彼蓋以內外傳之文不相合故特傅會其説歟棄德崇姦崇聚也崇尊也書泰誓崇信姦回孔傳曰尊信之也成十八年傳崇諸侯之姦注曰崇長也亦通棄嬖寵而用三良三良叔詹堵叔師叔所謂尊賢疏曰如杜此説則謂鄭伯尊賢與傳文尊賢乖者能用三良則是鄭伯之賢王當尊此鄭伯但杜注省略耳今案此注實誤孔惡斥言故云省略也施者未厭施功勞也施與也女德無極婦怨無終婦女之志近之則不知止足逺之則忿怨無已言女婦放蕩之德無所止極忿怨之心無有終已也二十五年遇公用享於天子之卦也大有九三爻辭也三為三公而得位變而為兊兊為説得位而説故能為王所宴享此直舉九三本爻之辭未及於變卦也其下文天為澤以當日乃説變卦義耳王章也章顯王者與諸侯異王章猶云王制爾外傳亦説此事韋注以章為表明杜依用之非也二十六年室如縣罄如而也言居室而資糧縣盡如之為而雖傳記多有然於此自當依本字讀孔疏引服虔劉炫之説皆然王氏學林謂如當訓似是也罄國語作磬韋昭注公府藏空虛但有榱梁如縣磬也又禮記磬于甸人疏援此傳文正作磬而下著皇氏説亦云如縣樂器之磬蓋罄磬古字通借樂記石聲磬注讀為罄即其例也大師職之職主也大公為大師兼主司盟之官劉用熙曰言周之大師主之不必專謂大公夔子不祀祝融與鬻熊鬻熊祝融之十二世孫劉炫云自祝融至鬻熊計其間有一千二百年何得止十二世乎孔疏以為傳寫之誤理或然也二十八年距躍三百曲踊三百距躍超越也曲踊跳踊也百猶勱也三百之義不可解勱者勉力也以百為勱前無此訓邵文莊公曰距躍直跳也曲踊橫跳也橫跳者必先直而旋故不曰橫而曰曲百音陌猶阡陌之陌三百蓋躍踊之度大約有此也此説亦未識然否背惠食言以亢其讎亢猶當也讎謂楚亢蔽也讎謂宋宋者楚之讎外傳所謂未報楚惠而亢宋者也今天誘其衷衷中也家語王肅注曰衷善也天誘導其善也寧子職納橐饘焉寧俞以君在幽隘故親以衣食為已職橐衣囊饘糜也槖以盛饘故曰橐饘寧子慮防鴆毒故以饋食為已職必不兼及衣矣疏曰槖以盛衣亦可盛食宣二年傳為之簞食與肉置諸槖以與之是也三十二年卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉聲自柩出故曰君命大事戎事也卜偃聞秦密謀故因柩聲以正衆心雍絳相去既逺秦人密謀卜偃無由得聞或當自以他術知之左氏好采異説此等竒怪猥多未容悉以理斷三十三年禮成而加之以敏敏審當於事也逸周書曰敏疾也此言其能成禮而加捷疾耳天奉我也奉與也奉承也猶言獻也葬僖公緩文公元年經書四月葬僖公僖公實以今年十一月薨并閠七月乃葬故傳云緩劉敞曰傳云葬僖公緩作主非禮也緩以下乃當為句杜讀緩以上為句非也僖公以十二月薨明年四月葬凡五月也不得云緩杜以文二年冬傳云襄仲如齊納幣禮也故欲遷僖公之薨於十一月則除喪在二年十一月而納幣為十二月乃與傳合獨不顧作主非禮也之語無所繫乎卒哭而祔既葬反虞則免喪故曰卒哭哭止也父母之喪哭無時既虞乃卒哭謂卒此無時之哭惟存朝夕哭而已杜云免喪故曰卒哭非也大抵欲以成其既葬除服之謬説耳蒸嘗禘於廟冬祭曰蒸秋祭曰嘗新主既立特祀於寢則宗廟四時常祀自如舊也三年禮畢又大禘乃皆同於吉劉用熙曰卒哭而祔者告新主以當入祖廟而告祖父以當遷他廟也既告則新主復于寢三年喪畢遇四時之吉祭而後奉此主入廟此周禮也今傳言特祀於主蒸嘗祭於廟者謂如小祥大祥禪則就寢特祀此主若蒸嘗禘之常祭則不於寢而於廟合祭也然與禮異矣今案劉説得之蓋傳為作主故生此論其曰蒸嘗禘於廟者就新主言耳杜注不明此義直云宗廟四時常祀自如舊則與上文意不貫屬是左氏之言既違禮文而元凱之説復戾傳意也其謂常祀不以喪廢又以禘為三年喪畢之祭則先儒辨之矣文公元年榖也豐下豐下蓋面方豐下謂頥頷豐大也衛孔達帥師伐晉君子以為古古者越國而謀合古之道而失今事霸主之禮故國失其邑身見執辱伐晉非善謀傳乃謂君子以為古故杜為此説以護其失耳二年不登於明堂明堂祖廟也以明堂為祖廟蓋本蔡雍輩之説袁淮正論及近世諸儒辨之詳矣辭多不録子雖齊聖齊肅也詩小宛人之齊聖鄭箋以齊為中正下十八年傳齊聖廣淵杜注亦云齊中也五年臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸蓼與六皆臯陶後也文十八年傳注庭堅即臯陶字孔疏謂本於鄭玄論語注今不知鄭得之何書馬永卿曰若庭堅即臯陶則文仲不應連言之似是兩人耳羅泌曰六臯陶之後而蓼則庭堅之後預説誤矣今案焦贛易林云尨降庭堅為陶叔後封於蓼六福履綏厚然則庭堅者乃臯陶之子若孫耳先漢去古未逺焦氏所傳宜得其真蓋二國皆臯陶後而庭堅則或以支子别封自為其國之祖故文仲得並舉之也寧嬴從之嬴逆旅大夫劉炫謂寧嬴是客舍主人非大夫也今案晉語亦云舍於逆旅寧嬴氏則非大夫明矣沈漸剛克沈漸猶滯溺也漸書作潛沈潛者沈深而潛退非滯溺也六年辟刑獄辟猶理也辟法也以法斷治之也樹之風聲因土地風俗為立聲教之法謂樹立其風化聲教也如杜説則惟樹聲耳故孔疏亦微譏其誤使求遭喪之禮以行聞晉侯疾故語稱文子三思而後行蓋其臨事過於周詳耳非以聞晉侯疾也若劉炫謂聘使之法自須造遭喪之禮而行用此規杜則亦未然信如所言即是常禮文子不得自云過求傳亦無庸記其事也難必抒矣抒除也案説文抒挹也不得為除當從服虔本作紓紓緩也解也七年葛藟猶能庇其本根葛之能藟蔓繁滋者以本枝廕庥之多傳以葛藟喻公族本根喻公室也如杜説則是葛藟反藉本根之庇戾傳意矣戒之用休有休則戒之以勿休休美也民之為善者則休美其事而戒諭之使勉而勿怠也八年且復致公壻池之封自申至於虎牢之境公壻池晉君女壻又取衛地以封之今并還衛也申鄭地據傳文似是致之於衛耳然申至虎牢皆鄭地何緣乃以歸衛杜注于上年云為晉歸鄭衛田張本此云今并還衛立文不明孔疏強解義終難通劉炫從服虔説以為致之于鄭也更詳之劉用熙曰公壻池者楚地名有公壻溪見定五年此人蓋因地為氏非晉君壻也未知是否十一年晉之滅潞也在宣十五年獲僑如之弟焚如齊襄公之二年魯桓之十六年鄋瞞伐齊齊王子成父獲其弟榮如榮如焚如之弟榮如以魯桓十六年死至宣十五年一百三歲其兄猶在傳言既長且壽有異於人史記魯世家引此傳文作齊惠公之二年又齊世家云惠公二年長翟來王子城父攻殺之十二諸侯年表亦于齊惠公二年書王子城父敗長翟三文皆同案惠之二年即魯宣之二年也在晉滅潞之前僅十三年耳此傳以惠公為襄公蓋傳寫之訛杜因有是説失之不考也十二年寡君敢辭玉不欲與秦為好故辭玉趙子常曰聘義云以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也然則聘禮終當還玉而秦人欲必致之故襄仲以禮辭之非不欲與秦為好也十三年繞朝贈之以策䇿馬撾臨别授之示已所策以展情劉協文心雕龍云繞朝贈士會以䇿子家與趙宣以書巫臣之遺子反子産之諫范宣詳觀四書辭若對面其指蓋以為書䇿也孔疏引服虔解亦如此子家賦載馳之四章載馳詩鄘風四章以下義取小國有急欲引大國以自助此與襄十九年穆叔見叔向賦詩皆云四章蓋取控于大邦誰因誰極之義然在今詩實為五章故杜解云四章以下蓋委曲以就傳文耳或者古詩章次與今不同如宣十二年楚子引周頌之比蘇氏并此詩二章三章為一求合于傳恐未然也十四年公子商人驟施於國驟數也説文驟馬步疾也此云驟施有急而且數之意諸言驟諫驟朝之類皆放此將免我乎爾為之言將復殺我疏曰言爾已弒君矣我若為君爾肯放免我乎必將復殺我言我若為君爾必復殺我今將免我于死乎則無庸立我而爾自為之耳十六年先君蚡冒蚡冒楚武王父依史記世家則蚡冒是武王兄不得為父孔疏謂世家之言多有紕繆故杜不用然杜説亦無他據疑父本作兄或文誤耳十七年鄭子家使執訊而與之書以告趙宣子執訊通訊問之官為書與宣子執訊者執其通訊問之人而與之書也出車詩云執訊獲醜亦言執其可訊問者事雖不同文足相比鹿死不擇音音所茠廕之處古字聲同皆相假借以音為廕未之前聞案服虔解云鹿得美草呦呦相呼至于將死困迫不暇復擇善音急之至矣莊子獸死不擇音郭象注云野獸蹴之窮地意急情盡則和聲不至亦此意也杜泥於下文鋌而走險之意遂生此説鋌而走險急何能擇鋌疾走貌言急則欲蔭芘於楚如鹿赴險詳子家此書未見其有從楚之意下文云將悉敝賦以待於倏者正謂如鹿走險欲一鬭以死不暇擇音而鳴之惡耳鋌字書作鹿走貌十八年其器則姦兆也兆域也以器為兆域于義未允或曰姦兆者姦之徴兆也宣慈惠和宣遍也宣通也明也崇飾惡言崇聚也崇者增髙之意服讒搜慝搜隱也慝惡也搜索也林堯叟云求人之隱慝是也天下之民謂之窮竒謂共工其行窮其好竒戴章甫曰據山海經神異經吕氏春秋諸書所記則渾敦窮竒檮杌叨餮俱獸名蓋四凶之號皆取象于惡獸杜氏考之未詳乃以義理釋之非也今案宋俞成所著叢説亦有此論然服虔解已如是矣投諸四裔以禦魑魅裔逺也説文裔衣𥚑也徐鍇曰𥚑衣邊也故謂之四裔傳中言裔夷裔子裔胄之類其義皆視此左傳附注卷一

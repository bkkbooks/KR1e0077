body:
  text: 左傳附注卷二明陸粲撰杜氏集解宣公元年會于平州以定公位篡立者諸侯既與之會則不得復討臣子殺之與弑君同故公與齊會而位定趙子常曰杜謂春秋時事情有此耳非義理當然也二年敗國殄民殄盡也殄絶也文馬百駟畫馬為文四百匹說文引此傳作馼馬亦云畫馬也丘光庭曰文馬馬之毛色自有文采重其難得若畫為文乃是常馬何足貴乎問其名居問所居林堯叟曰問其名及所居也我之懷矣自詒伊慼逸詩也弼風雄雉篇云我之懷矣自詒伊阻疑即此詩其以阻為慼盖傳讀之異使屏季以其故族為公族大夫盾以其故官屬與屏季使為衰之適以其故族者謂將領其族人非官屬也三年昔夏之方有德也禹之世傳言夏之方有德不必是禹禹之鑄鼎事不經見墨子云夏后開命大㢘鑄鼎於昆吾灼龜得逢逢白雲之兆此說亦未知其審螭魅罔兩罔兩水神魯語木石之怪夔罔兩水之怪龍罔象杜此說當是誤作罔象解耳孔疏縁上文川澤山林之語謂螭魅為山林之神則罔兩宜為川澤之神其說固矣六年以盈其貫將可殪也殪盡也貫猶習也劉炫曰泰誓云商罪貫盈言紂之為惡如物在繩索之貫不得為習也此説得之孔疏引詩射則貫兮為比謂義得兩通者謬矣韓非子云恐其以我滿貫也滿貫即盈其貫之意耳殪書孔傳訓為殺是也周書曰殪戎殷周書康誥也義取周武王以兵伐殷盡滅之如注意以戒爲兵則殪字宜倒向戎字下于文不順書蔡傳以爲殪滅大殷者是也爾雅訓戎爲大揚雄方言齊魯陳衞之間謂大曰戎書稱戎殷猶詩言大商耳召桓公逆王后於齊為成二年王甥舅張本成二年傳定王稱齊甥舅之國注謂齊世與周昏故曰甥舅是也盖自大公之女邑姜爲武王后其來逺矣不假此年逆后事爲張本八年楚為衆舒叛故伐舒蓼滅之舒蓼二國名疏曰二國名者盖轉寫誤當云一國名釋例有舒羣舒舒蓼舒庸舒鳩以為五名則與文五年滅蓼同盖蓼滅後復故楚今更滅之羅泌曰蓼與舒蓼別舒蓼臯陶之後偃姓若舒又自一國僖之三年滅矣預既妄分舒蓼爲二國名孔氏遂以爲即文五年楚所滅之蓼皆臆説也今案孔知杜失不正言規之而云轉寫之誤即如所言第云國名足矣何用加一字乎尋杜前後訓釋並無此例足知非也其引釋例以羣舒為一種亦謬羣舒者猶云羣蠻通衆舒而言也九年公卿宣淫宣示也宣明也揚也十二年先縠佐之彘季代林父劉炫云傳文皆稱彘子縠非彘季也今案晉有士魴稱彘季杜或縁此而譌孔疏以季友季路為比謬矣觀釁而動釁罪也桓八年傳注云釁瑕隙也服䖍亦云釁間也此以釁為罪昭元年吳有釁注云過也皆非是撫弱耆昧以務烈所可也言當務從武王之功業烈所者功烈之處所也猶民知義所之所有律以如己也如從也法行則人從法法敗則法從人坎為法象今為衆則散為川則壅是失法之用從人之象故曰律否臧且力竭也竭敗也坎變為兊是法敗此傳義頗難曉尋其語脉當讀有律為句以如己也故曰律又自為句盖言師行有律以為帥者能使其下如已也故謂之律如己猶言從己謂從帥令而不逆即上文執事順成之意也從帥為臧否臧猶不臧也不臧則律且竭而敗矣杜斷故曰律三字向下既非又專論卦象而不言事理此其蔽耳盈而以竭夭且不整所以凶也水遇夭塞不得整流則竭涸也夭且不整亦就行師言之說文夭屈也言其軍法屈而不伸散而不整所以凶也事之不㨗㨗成也逸周書曰捷克也聽而無上衆誰適從聽彘子趙同趙括則為軍無上令衆不知所從同括有言在楚師北轅之後此時未也且伍參獨言先縠不仁何嘗及二子乎盖謂林父之將令不行軍衆欲稟聽進止而無上令不知所從也在軍無日不討軍實而申儆之軍實軍器隱五年注軍實車徒器械是也兩馬掉鞅而還兩飾也掉正也示間暇兩古字作掚掉振也揺也邵文莊公曰兩馬掉鞅掉兩馬之鞅也盖驂馬折旋則其鞅必掉之而示閒暇之意亦在其中矣楚人乗我乗猶登也小爾雅曰乘陵也楚人惎之脫扄惎教也案惎毒也此謂惎為教者杜以脫扃及下文拔斾皆教人之語故以意解之爾說文引此傳作畀云舉也引黄顥說廣車䧟楚人為舉之也其義良是疑今文作惎者誤我求懿德肆於時夏允王保之肆遂也夏大也言武王既息兵又能求美德故遂大而信王保天下國語韋注云允王保之言信哉武王能保此時夏之美其說是也尋下文云保大其義自明故使子孫無忘其章著之篇章使子孫不忘章者典章也劉炫云章明之功業也亦通今罪無所晉罪無所犯也所者罪之在也憂未歇也歇盡也歇息也十四年過我而不假道鄙我也鄙我亡也以我比其邊鄙是與亡國同呂氏春秋說此事云往不假道來不假道是以宋為野鄙也髙誘注謂以宋為鄙邑今案鄙當為鄙薄之意昭十六年傳夫猶鄙我注云鄙賤是也尚書反鄙我周邦孔傳亦云鄙易周家於是有庭實旅百主人亦設籩豆百品實於庭以答賔劉炫曰莊二十二年庭實旅百杜云諸侯朝王陳贄幣之象則此聘而獻物亦實百品於庭非謂主人也於是有容貌采章嘉淑而有加貨容貌威儀容顔采章車服文章嘉淑令辭稱讃加貨命宥幣帛也言往共則來報亦備劉炫曰容貌采章謂𤣥纁璣組羽毛齒革可充衣服旌旗之飾者嘉淑謂美善之物加貨言賄賂之多皆賔所獻亦庭實也獻子勸君行聘唯當論聘之義深不宜言主之禮備豈慮楚不見報而言此乎今案劉説皆得之或斷嘉淑以下自為句云大國有嘉美之事則加貨物以聘之者非也十五年山藪藏疾山之有林藪毒害者居之藪大澤也一曰澤之水希者也此云山之有林藪盖誤孔云近山近澤皆得稱藪妄也棄仲章而奪黎氏地黎氏黎侯國詩式微及旄丘序言狄人迫逐黎侯黎侯寓於衞疑即此事此傳下文云立黎侯而還盖復其國矣舊説以二詩為衛宣公時作殆非也以事神人而申固其命審其政令謂重固其天命耳豈謂政令乎商紂由之故滅由用也由從也猶行也謂此物也夫物事也物類也成公二年余姑翦滅此而後朝食翦盡也翦齊斷也猶翦商之翦宣十二年注云翦削也義亦近之又徐鍇說文繋傳引此文作揃搣今案莊子揃搣可以休老三蒼云揃猶翦也玉篇云搣拔除也又史游急就篇沐浴揃搣注云鬄拔眉髪也今此作翦滅盖古字通借且懼奔辟而忝兩君臣辱戎士若奔辟則為辱晉君并為齊侯羞故言二君臣辱戎士四字與注意不㑹而與下文敢告不敏語脉相屬宜斷向下辟女子使辟君也辟義如周禮司㓂前王而辟讀作闢孟子行辟人趙岐注辟除人使卑避尊也盡東其畆使壟畆東西行衍西字服䖍舊注無先王疆理天下物土之宜而布其利播植之物各從土宜天下句物以下自為句物猶後傳物土方之物相也相其土之所宜也周官載師掌任上之灋以物地事淮南子云欲知地道者物其樹以役王命役事也役猶孟子小役大之役謂以王命供役使也不然不見許不然言不如此也畏君之震師徒撓敗震動也文六年傳何震之有注震威也敝邑之幸亦云從也況其不幸敢不唯命是聽言完全之時尚不敢違晉今若不幸則從命丘光庭曰言幸而戰勝亦當從晉命況不幸而敗固不敢不服也劉炫説同用蜃炭燒蛤為炭以瘞壙劉炫以為用蜃炭者用蜃復用炭也今案周禮掌蜃掌歛互物蜃物以共闉壙之蜃鄭注以蜃禦濕也不言燒蜃為炭又掌炭云掌灰物炭物之徴令則灰炭二者不同孔疏謂炭亦灰之類非也君生則縱其惑謂文十八年殺母弟須宋文之惑傳所不言其可見者惟有殺母弟須一事故杜以此當之未必然也六年其惡易覯惡疾疹覯成也下文有汾澮以流其惡注以惡為垢穢與此字同訓異良所未曉據獻子説沈溺重膇之疾猶在墊隘之後不應于此遽云其病易成也宜從後注又案爾雅訓覯為見其惡易覯言水淺故垢穢易見耳民愁則墊隘墊隘羸困也傳中屢言墊隘杜之注釋各殊此年云羸困襄九年云猶委頓二十五年云慮水雨三者皆非正訓案說文引此傳曰墊下也尚書下民昬墊注溺也昭三年傳湫隘注隘小也孔疏言地之下濕狹隘者是矣餘見後録且民從教無災患從教言其民易使耳何與災患乎八年詩曰愷悌君子遐不作人遐逺也作用也詩大雅言文王能逺用善人不語助詩朱傳云遐與何通言其必作人也其孰以我為虞虞度也虞慮也夫狡焉狡猾之人傳文云夫狡焉思啓封疆以利社稷者狡焉當屬下為句唯然故多大國矣唯或思或縱也世有思開封疆者有縱其暴掠者莒人當唯此為命言有思啓封疆者有縱弛而不設備者故得兼并以成大國九年其為大子也師保奉之以朝於嬰齊而夕於側也嬰齊令尹子重側司馬子反言其尊卿敬老言朝夕於二卿者明其有所嚴憚而受教焉以成德不徒曰尊卿敬老而已十年不食新矣言公不得及食新麥食新汎言豈必謂麥居肓之上膏之下若我何肓鬲也素問肓鬲之上中有父母揚上善說云心下鬲上為肓君子曰忠為令德非其人猶不可況不令乎言叔申為忠不得其人還害身非其人盖謂叔申本非賢者雖欲效忠而不見信于君適以自害耳十一年所以質信也質成也質實也實其相結之信也十二年俾隊其師隊失也隊猶隕也故詩曰赳赳武夫公侯腹心舉詩之正以駮亂義詩言治世則武夫能合德公侯外為扞城内制其腹心所引二詩分屬治亂此上文曰及其亂也略其武夫以為已腹心股肱爪牙即繼之以此詩則所謂公侯腹心者非治世之美辭矣古人說經大抵斷章取義杜亦甞云春秋傳引詩不與今說詩者同于此乃獨謂舉詩之正以駮亂義得無與前指謬乎十三年能者養之以福養威儀以致福民受天地之中以生所謂天命之性也人能循威儀之則以養其性則順命而致福不能則棄命以取禍杜云養威儀下注棄其命云失中和之氣皆非也又漢書律厯志援此文作能者養以之福顔師古注之往也往就福也此傳孔疏云往適于福又云將身向福與顔注合其義為長諸侯疾之將致命於秦時無諸侯盖諸侯遥致此意劉炫以此語為誣是也杜説固矣伐我保城殄滅我費滑伐保城誣之疏曰伐涑川俘王官傳皆無文今獨謂此為誣者於時輕行襲鄭不得在道用兵故知誣之保城不知其處或是近滑之城秦師過而掠之彼傳偶不言耳何用知其為誣也君亦不惠稱盟不肯稱晉望而共盟稱舉也言不肯加惠於晉而舉盟芟夷我農功夷傷也隱六年注夷殺也今案夷亦芟也周禮稻人作荑人薙氏掌殺草夏日至而夷之秋繩而芟之鄭注夷者以鉤鎌迫地芟之也盖芟夷義同重言之者以圓文耳揚雄賦夷野草張銑注夷平也亦通白狄及君同州君之仇讎而我之昏姻也季隗廧咎如赤狄之女也白狄伐而獲之納諸文公春秋經傳中書赤狄白狄皆標其號文公所奔之狄傳不言赤白此杜臆説耳孔疏曰未必晉于白狄別無昏姻斯言是也十四年詩曰兕觥其觩㫖酒思柔觩陳設之貌詩鄭箋云其罰爵徒觩然陳設而已觩然謂爵耳非陳設貌也説文引詩作觓榖梁傳郊牛日展觓角范寗曰觓球球然角貌十五年鱗朱為少司冦鱗矔孫依世本當為曽孫則決雎澨澨水涯決壊也説文曰澨埤増水邉土人所止者又曰沃行流也言去土而行水也十六年致死以補其闕闕戰死者闕謂軍國之事有所闕乏不專謂戰死者奸時以動禮不順時周四月今二月妨農業是時晉國無釁而楚以利求鄭自啓其端不能順時息民故曰奸時非謂妨農也蹲甲而射之徹七札焉蹲聚也一𤼵逹七札言其能䧟堅蹲之訓聚于義未詳又此不解札義案太𤣥曰比札為甲考工記函人注革堅者札長疏云一葉為一札戰國䇿身自削甲孔注云札木簡之薄者甲之革縁如之諜輅之余從之乘而俘以下欲遣輕兵單進以距鄭伯車前而自後登其車以執之言諜則非輕兵矣盖兵交必有諜在其間所以覘候形勢不亦識乎知其以往言好暇故致飲識記也謂其能記往言也展車馬展陳也周禮肆師展犧牲鄭注展省閱也大夫命側側敢不義言以義命己不敢不受林堯叟曰言不敢不引義自裁憂猶未弭弭息也既𦵏國人皆將從子臧所謂憂未息言宣公薨負芻簒立國憂未息耳未遽説子臧事也師逆以至聲伯戒叔孫以必須所逆晉師至乃食此注當在四日不食以待之之下誤跳向此食使者使者豹之介杜謂叔孫豹請逆于晉聞魯將討僑如遂奔齊不還故以此使者為豹之介據昭四年傳叙豹事是其適齊在僑如前但不能確知何時云請逆遂奔杜意之耳謀國家不貳謂四日不食以堅事晉此槩言之何必指不食之一節十七年與婦人蒙衣乘輦而入於閎蒙衣亦為婦人服與婦人相冐蒙衣者為婦人衣以自蒙冒也此云相冒文亦小誤受君之禄是以聚黨有黨而争命争死命也罪孰大焉争命言不受君欲殺之命而與之争也傳稱晉公子重耳之言曰保君父之命而享其生禄於是乎得人有人而校罪莫大焉與此郤至辭指正同昔吾畜於趙氏孟姬之讒吾能違兵違去也韓厥少為趙盾所待養及孟姬之亂晉將討趙氏而厥去其兵示不與黨言此者明已無所偏助晉語韋昭注違兵者能違其兵難卒存趙氏今未可脅以殺君此說是也十八年晉悼公即位於朝厲公殺絶故悼公不以嗣子居喪疏曰釋例云厲公見殺悼公自外紹立本非君臣無喪制也計厲是文之曽孫悼是文之𤣥孫有緦麻親法當服斬而云無喪制者悼之祖父去晉適周與本親隔絶厲既見殺悼遂被迎為君即與厲公體敵且葬厲公以車一乘國内尚不以為君不可責悼公服斬也縱使當為之斬絶而别立亦非嗣矣欒書中行偃弑君而殺其𦵏禮猶崔杼于齊莊公爾晉之臣子寧當不以為君也悼雖父祖事周然猶晉之公孫恩義未絶既承大宗惡有不為服斬者乎其不能自處以道正踰年即位之禮所失非細杜孔二子之説皆悖禮傷教不可以訓矣且事晉何為晉必恤之言宋常事晉何為顧有此患難言宋平日事晉何為哉正望其患難相援耳以此知晉必恤已也襄公二年官命未改成公未𦵏嗣君未免喪故言未改不欲違先君意疏曰先君既𦵏嗣君正位乃得建官命臣十六年晉侯改服脩官是其事也未𦵏則皆因舊事故云官命未改官命猶言公命謂成公之命未改耳凡云官者皆謂國家後傳云無失官命又云官之師旅其義並同三年舉其偏偏屬也三十年傳司馬令尹之偏注云偏佐也此羊舌職為祁奚佐赤是其子故云舉其偏四年金奏肆夏之三不拜肆夏樂曲名周禮以鐘鼔奏九夏其二曰肆夏一名繁三曰韶夏一名遏四曰納夏一名渠盖擊鐘而奏此三夏曲魯語云金奏肆夏繁遏渠杜此注即用韋昭説爾劉炫曰杜解不甚惬當何則此下文言文王之三即文王是其一大明綿是其二鹿鳴之三即鹿鳴是其一四牡皇皇者華是其二然則肆夏之三亦當肆夏是其一繁遏渠是其二若繁即是肆夏何須重舉二名今案劉説是也鄭𤣥于周禮注引吕叔玉説三夏者肆夏是一繁遏是二渠是三此雖未見所據要為近之季孫曰略不以道取為略真德秀曰季孫意在少抑妾母不使盡同小君其曰略者猶言從簡而已匠慶不悟其指乃略取蒲圃之檟而季孫不之禁可謂賢矣孔氏乃以律略人略賣人為比豈季孫之賢而肯為掠奪之事乎今案釋例亦云略者議從略賤與此注不同靡奔有鬲氏靡夏遺臣事羿者真德秀曰傳云靡自有鬲氏收二國之燼以滅浞而立少康忠于王室如此考其本末乃事相非羿也豈有夏之忠臣而肯事簒賊者哉武不可重重猶數也重讀輕重之重謂重其事也杜讀重累之重故以為數非是戎狄荐居荐聚也疏引服䖍云荐草也言狄人逐水草而居無常處今案古字荐薦通漢書終軍傳北胡隨畜薦居蘇林云薦草也顔師古注援此傳文曰薦讀曰荐荐屢也言隨畜牧屢易故居不安住也六年司武而梏於朝難以勝矣司武司馬言其懦弱不足以勝敵勝猶當也堪也讀若天壓已弗勝之勝言其不堪司武之任也子罕善之如初言子罕雖見辱不追忿所以得安疏引服䖍云子罕初欲逐樂轡以正國法及轡射其門乃復善之如初是為茹柔吐剛喪其志也此論優於杜矣七年詩曰退食自公委蛇委蛇委蛇順貌詩召南言人臣自公門入私門無不順禮下文云謂從者也衡而委蛇必折然則委蛇之義兼從與衡不得專言順矣詩鄭箋云委蛇自得之貌八年如匪行邁謀是用不得于道匪彼也行邁謀謀於路人也不得于道衆無適從詩鄭箋云匪非也言不行而坐圖逺近故不得于道路也悉索敝賦索盡也既云悉則不得重言盡矣廣邪索取也悉索盖言盡取以行也或疑索當作率據國語云悉帥敝賦率與帥通譌為索耳翦焉傾覆翦盡也言其傾覆如被翦斷也九年古之火正或食於心或食於咮以出内火謂火正之官配食於火星建辰之月鶉火星昏在南方則令民放火建戍之月大火星伏在日下夜不得見則令民内火禁放火此獨于鶉火言見大火言伏于義末盡漢書五行志説曰季春昏心星出東方而咮七星鳥首正在南方則用火季秋星入則禁火以順天時救民疾據此是二火俱有出内也下文因宋故獨言大火耳劉用熙曰食于心食于咮者猶食邑之食謂封火正于火之分野使掌出内之政令非謂死而配食也始往而筮之遇艮之八周禮大卜掌三易然則雜用連山歸藏周易二易皆以七八為占故言遇艮之八劉禹錫稱董生之説曰揲蓍者九與六為老老為變文七與八為少少為定位國語晉公子筮得貞屯悔豫皆八八非變爻故不曰有所之穆姜筮遇艮之八史曰是謂艮之隨夫艮之隨唯二不動斯遇八也餘五位皆九六故反焉筮法以少為卦主若定者五而變者一即宜曰之某卦觀之否師之臨之類是也今變者五定者一宜從少占艮之六二曰艮其腓不拯其隨其心不快史以遇此為不利故從變爻而占曰是謂艮之隨苟以悅於姜耳而杜元凱以為雜用三易故有遇八之云非也猶愈於戰勝聚戰暴骨以逞不可以争言争當以謀不可以暴骨大勞未艾君子勞心小人勞力先王之制也艾息也言當從勞心之勞暴骨以逞意與上文相屬若曰猶勝于聚戰而暴骨以逞也不可以争意乃屬下言今不可與戰争常大勞未息之時君子運謀勞心小人勤事勞力此先王之法乃今日所當行者明不徒以戰争為務公還及衞冠於成公之廟成公今衞獻公之曽祖從衞所處上文言君冠以先君之祧處之杜云諸侯以始祖之廟為祧盖用鄭𤣥舊説至是及衛冠于成公之廟乃非始祖也故又云從衞所處以解釋前言耳其實祧是廟之通稱説見昭元年要盟無質質主也質實也哀十二年傳先主與吳王有質注質盟信也十年請以桑林桑林殷天子之樂名吕氏春秋武王使召公與微子盟云相奉桑林高誘注亦以為樂名今案荘子言桑林之舞陸博士謂即此傳舞師題以旌夏者是也師競已甚競争競也宣元年傳不競於楚注云競强也今此亦謂鄭師强競太甚耳下十三年傳楚實不競注謂不能脩德與晉競亦非是退楚必圍我猶將退也不如從楚亦以退之以退楚劉用熈曰猶之為言均也言諸侯均將退也不如從楚亦以退諸侯且免楚之圍此説與杜異于義亦通王賴之而賜之騂旄之盟騂旄赤牛也騂赤牛旄旄牛也山海經曰旄牛其狀如牛而四節生毛爾雅犣牛郭璞注曰旄牛也十一年魏絳於是乎始有金石之樂禮也禮大夫有功則賜樂禮無此文杜順傳為説耳十三年唯是春秋窀穸之事窀厚也穸夜也厚夜猶長夜春秋謂祭祀長夜謂𦵏埋王若虚曰窀穸字從穴盖冡壙之稱杜以為長夜未曉其説今案説文釋窀字云𦵏之厚夕其語本難通杜遂訓為長夜謬矣毛晃云窀穸墓穴是也詩曰不弔昊天亂靡有定言不為昊天所恤則致罪也罪字誤當作亂十四年來姜戎氏昔秦人迫逐乃祖吾離於𤓰州四嶽之後皆姜姓又别為允姓此注以昭九年傳景王責晉之辭為據然彼文云先王居檮杌于四裔故允姓之姦居于𤓰州則其處此土舊矣似非秦人所逐又云惠公始誘以來使入我郊旬杜謂即僖二十二年陸渾之戎遷伊川者是已今此姜戎自居晉南鄙非其族類也盖當時晉人所遷或非一種其所處亦非一地謂姜姓别為允姓豈其然乎王符潛夫論羅泌路史皆以陸渾之戎為姜姓亦非也子叔齊子齊子叔老字也叔老公孫嬰齊之子不應以父名為字齊是其諡猶齊姜齊歸矣謚法執心克莊曰齊吳子諸樊既除喪諸樊吳子乗之長子乘卒至此春十七月既𦵏而除喪此時吳俗未同于諸華其喪制宜不能如禮然其𦵏之歲月則傳所不言元凱毎以既𦵏為除服之限故有是説耳君義嗣也諸樊適子故曰義嗣王肅曰義宜也適子嗣國得禮之宜也穆子賦匏有苦葉詩弼風也義取深則厲淺則揭言已志在於必濟魯語說此事云叔嚮退召舟虞與司馬曰夫苦匏不材于人共濟而已魯叔孫賦匏有苦葉必將涉矣今杜自為此解而不從彼義其忘諸乎疏謂厲掲之義切于苦匏者謬矣雖奸之庸知愈乎言逐君更立未知當差否愈猶勝也言未知能勝今日否鄄人執之公徒因敗散還故為公執之劉用熈曰公雖居鄄鄄人反執公徒言公失民也余不説初矣言初從君非說之不獲已耳言已初雖從君以出今自悔焉不復以曩事為喜故云不說初也官師相規官師大夫書𦙍征孔傳云官師衆官漢書並建豪英以為官師顔注師長也各為一官之長也世胙大師以表東海胙報也表顯也謂顯封東海以報大師之功此解於傳文不順胙猶無克胙國之胙謂世胙大師之業以表正東海襄二十九年注所謂為東海之表式是也十八年負其衆庶負依也負恃也曽臣彪彪晉平公名稱臣者明上有天子以謙告神曽臣猶末臣曽本訓重諸侯于天子不得言重臣盖謙辭以媚神耳穆天子傳云曽祝佐之郭璞注引此傳文亦云曾重也使司馬斥山澤之險斥候也斥開也將疏建旌旗以為陳故開斥山澤之險乃脫歸脫不張旗幟直言脫歸耳何由知不張旗幟皆衿甲面縛衿甲不解甲衿結也通作紟少儀云國家靡敝則甲不組縢鄭注縢紟帶也十九年夫銘天子令德天子銘德不銘功邵文莊公曰令猶今龜之令言以徳布于銘也諸子仲子戎子諸子諸妾姓子者二子皆宋女管子云中婦諸子房𤣥齡注謂諸子内官之號是也哀五年傳諸子鬻姒與此同戎子盖戎女姓子者猶晉之小戎子爾城西郭懼齊也前年與晉伐齊又鑄其器為鐘故懼與晉伐齊齊大魯小理自應懼不待鑄鐘杜為此説以傅會臧孫之言耳是謂蹷其本蹷猶拔也蹷仆也昭二十三年傳云推而蹷之是也二十一年子以姬氏妻之而與之邑使食漆閭丘謂與之魯邑耳人謂叔向曰子離於罪其為不知乎譏其受囚而不能去譏其知不能保身非謂不能去也詩曰優哉游哉聊以卒歲知也詩小雅言君子優游於衰世所以辟害卒其壽是亦知也令小雅無此詩孔陸皆以采菽卒章當之然彼詩乃云優哉游哉亦是戾矣且其通篇盛言君子來朝之美亦非衰世之作盖叔向所稱自是逸詩耳莊公為勇爵設爵位以命勇士爵飲酒器設此以觴勇士因名勇爵非爵位也二十三年我實不天子無咎焉言我雖不為天所祐子無天咎故可因言雖事不集而死實我自不為天所祐非子之咎也攝車從之鞅攝宣子戎車說文攝引持也言引車逐之則乘槐本而覆欒樂車擽槐而覆廣雅擽擊也此注文擽當作轢蒼頡篇轢輾也說文車所踐也陳文子陳完之孫須無史記世家須無是完曽孫此云孫盖傳寫脫之下妾不得與郊弔婦人無外事故據檀弓説此事盖以行弔于野為非禮故弗受耳二十四年在夏為御龍氏謂劉累也在商為豕韋氏豕韋國名在周為唐杜氏唐杜二國名殷末豕韋國於唐周成王滅唐遷之於杜為杜伯杜伯之子隰叔奔晉四世及士會食邑於范復為范氏此用國語韋昭舊注也案昭二十九年傳云夏后賜劉累氏曰御龍以更豕韋之後昭元年傳云遷實沈於大夏唐人是因以服事夏商杜注唐人若劉累之等累遷魯縣此在大夏依彼所言是居唐者非御龍之裔矣安得謂豕韋國唐也又傳言服事夏商則亦非殷末矣其曰封唐遷杜復何所據而知之故劉炫深以此為疑炫又引賈逵説云武王封堯後為唐杜二國非滅唐乃封杜也然則二國者盖同源而異𣲖居大夏為成王所滅者唐也初居魯縣後奔晉為范氏者杜也今合而為一誤矣孔氏病劉炫譏訐其逺祖余亦謂元凱自迷其本原大抵世逺典籍磨滅諸儒不能闕所不知而以意推言更成穿鑿毎如此爾餘見後傳而謂子浚我以生乎浚取也言取我財以自生浚取之深也易曰浚恒王弼注求之深者也莊九年浚洙公羊傳曰浚之者何深之也象有齒以焚其身賄也焚斃也疏曰象不燒死故訓為斃服䖍讀焚為僨僵也焚讀如字安知象無燒死者二十五年風隕妻不可娶也風能隕落物者變而隕落故曰妻不可娶此當以風隕妻為句言夫則從風風能隕妻也將庸何歸將用死亡之義何所歸趣趙子常曰將庸何歸即覆說上文君死安歸之意耳晉侯許之晉侯受賂還不譏者齊有喪師自宜退伐國聞喪而還語其常也今齊人弑君而伯主用師焉是討賊也非伐喪也孰謂其宜退哉傳不譏晉侯受賂當以其惡顯明無俟貶駮爾元凱斯言殊乖大義宵突陳城突穿也突觸也衝也或云此突字本作穴若漢攻大宛穴其城者故杜訓為穿也數俘而出但數其所獲人數不將以歸劉敞曰咸二年傳云蠻夷戎狄王命伐之則有獻㨗兄弟甥舅伐之告事而已不獻其功今傳謂子産獻㨗則非告事矣如曰數俘而出是無虜獲也安得㨗而獻歟今案傳直言數俘而出安知其不將以歸邪此自杜説爾故杜于後獻㨗下復注云獻入陳之功不獻其俘其遷就之迹亦顯然矣而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三恪其禮轉降示敬而已故曰三恪禮記郊特牲曰天子存二代之後猶尊賢也尊賢不過二代疏引古春秋左氏説曰國家封夏殷之後以為上公封黄帝堯舜之後謂之三恪鄭𤣥據樂記之文亦謂武王初封薊祝陳為三恪後封杞宋為二王後崔靈恩以此義為長曰若更立一代通備三恪者則非不過二代之意趙子常曰夏商之後皆作賔王家統承先王脩其禮物非但示敬而已不得言恪宜從鄭説不可億逞億度也逞盡也億逞未詳注意亦難通或曰億安也猶億吾鬼神之億逞解也言其欲憑陵我之志方盛不可安解也各致其辟辟誅也辟法也鳩藪澤鳩聚也聚成藪澤使民不得焚燎壊之欲以備田獵之處鳩聚若周官澤虞使其地之人守其財物以時入之于王府者也豈專以備田獵哉表淳鹵淳鹵埆薄之地表異輕其賦稅或云淳鹵地宜鹽者可資國用故表異之數疆潦疆界有流潦者計數減其租入賈逵以疆為疆㯺磽确之地者近是㯺堅也牧隰臯隰臯水崖下濕為芻牧之地孔疏所引周禮鄭注云九夫為牧二牧而當一井者是也賦車兵車兵甲士徒卒步卒甲楯之數使器杖有常數傳文以賦車兵徒卒甲楯之數為句杜于兵卒下各入注獨于甲楯言有常數亦小誤行無越思思而後行言所行不越于所思也故下云如農之有畔二十六年拂衣從之拂衣褰裳也拂衣者振拂其衣褰裳者攐舉其裳義亦小異頷之而巳頷揺其頭頷説文作顉低頭也徐鍇曰㸃頭以應也今左傳作頷假借也吾子獨不在寡人在存問之公聞文子答寗喜之言故忿之衞侯以文子不通外内之言故怨之其曰不在寡人猶鄭厲公責原繁云伯父無裏言也若文子之譏寗喜特私説之耳公詎得聞乎享子展賜之先路三命之服先路次路皆王所賜車之總名盖請之於王趙子常曰晉以黻冕命士㑹傳言請于王此不言請則自賜之也盖禮樂之自諸侯出于是久矣今案杜以路車之命非諸侯所得專故云爾成二年魯公賜晉三帥先路注云三帥已嘗受王之賜今改而易新此説尤不然如杜所見是天子之賜諸侯專之則不可改之而可也豈禮也哉受楚之功而取貨於鄭不可謂國秦不其然受楚獻功大名以貨免之小利故謂秦不爾謂受楚之功而取貨于鄭嫌有貪名傷國體耳非計名利之大小也商頌有之曰不僣不濫不敢怠皇命于下國封建厥福言殷湯賞不僣差刑不濫溢不敢怠解自寛暇故能為下國所命為天子詩鄭箋云天命之于下國以為天子是也欒范易行以誘之欒書時將中軍范燮佐之易行謂簡易兵備欲令楚貪已不復顧二穆之兵疏謂賈鄭皆讀易為變易之易今案國語説此事云若易中下楚必歆之韋注云鄭司農以為易行者中軍與下軍易卒伍也中軍之卒良故易之此説于義為勝晉人將與之縣以比叔向以舉材能比叔向言令其禄秩如叔向也二十七年公喪之如稅服終身稅即繐也喪服繐衰裳縷細而希非五服之常本無月數痛愍子鮮故特為此服禮日月已過乃聞喪而追服謂之稅獻公痛愍子鮮特為制服日月已满不忍即除如稅然也疏引服䖍説意亦如此杜以稅為繐非是且吾因宋以守病為楚所病則欲入宋城傳文云且吾因宋以守病則夫能致死病字宜讀屬下謂為楚所攻而病則宋與受其禍必能致死助我也何以恤我我其收之逸詩詩周頌假以溢我我其收之朱傳謂即此詩云何之為假聲之轉也恤之為溢字之譌也十一月乙亥朔日有食之辰在申司厯過也再失閠矣周十一月今九月斗當建戌而在申故知再失閠也文十一年三月甲子至今七十一嵗應有二十六閠今長厯推得二十四閠通計少再閠釋例言之詳矣釋例曰魯之司厯漸失其閠至此始覺其謬遂頓置兩閠以應天正前閠建酉後閠建戌云云劉敞曰杜云頓置兩閠詭聴駭俗非人情也周密曰杜所造長厯置閠疏數不齊多可疑者如此年則一歳兩閠然前此者二十一年二十四年二十六年皆有閠矣何縁至此失閏已再而頓置兩閏乎此其立法殆不可曉趙子常曰傳言司厯過也盖指王朝厯官猶桓十七年傳云官失之耳杜以為魯之司厯非也至哀十三年又注云季孫雖聞仲尼之言而不正厯此亦謂魯自有厯實承劉歆之誤劉説見漢志其所傳魯厯不與春秋相符杜亦謂好事者為之竊謂周室雖衰豈遽廢頒厯之禮諸侯亦安敢輒自為之魯厯既差史之所書日月應與周記不同韓宣子見魯春秋何以曰周禮盡在魯也斯理必不然矣二十八年宋之盟君實親辱君謂鄭伯案宋之盟鄭伯不在而楚為此言未詳或曰謂盟時約言云爾即所謂晉楚之從交相見者也吳句餘予之朱方句餘吳子夷末也史記吳世家書此事於王餘祭三年司馬貞曰餘祭以襄二十九年卒則二十八年賜慶封邑不得是夷末服䖍謂句餘即餘祭也崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘在二十五年案二十一年傳齊侯復討公子牙之黨執公子買于句瀆之丘公子鉏來奔叔孫還奔燕然則三子之斥逐乃莊公自為之不縁崔氏亂也傳文前後乖違注亦不明此意以徴過也徴審也昭三十年傳非公且徴過也注徴明也一云徵驗也以驗其過二十九年乃使巫以桃茢先祓殯茢黍穰説文黍穰也茢芀也又釋芀曰葦華也茢二字自異芀亦作苕爾雅謂之薍祓殯者以苕為帚非黍穰也杜誤以為茢孔疏因傅會云今之苕帚或用薍穗或用黍穰謬矣先君若有知也不尚取之不尚叔侯之取貨且先君而有知也毋寧夫人而焉用老臣言先君毋寧怪夫人之所為無用責我疏引服䖍曰不尚尚也言尚當取汝叔侯殺之毋寧寧也言寧自取夫人將焉用老臣乎此説是也猶未也猶有商紂未盡善也二南周詩何闗商紂賈逵云未有雅頌之成功是也國未可量也言其或將復興服䖍曰言其國之興衰世數長短未可量也渢渢乎大而婉險而易行渢渢中庸之聲婉約也險當為儉字之誤也大而約則儉節易行史記吳世家注引賈逵云其志大直而有曲體中庸之徳難成而實易行依此説則險當為險難之意非字之誤也今史記本或作儉疑後人以杜説追改其周德之衰乎衰小也猶有先王之遺民焉謂有殷王餘俗故未大疏曰服䖍以為此嘆變小雅也其周德之衰微疑其幽厲之政也今知不然者以小雅大雅二詩相對歌大雅云文王之德是歌其善者知小雅亦歌其善者也且魯為季札歌詩不應揚先王之惡以示逺夷服説非也服説是杜以衰為小義終未安又杜謂季札在呉嘗涉見此樂歌之文則其善惡札已自知之非魯人所能掩盖矣二雅篇數既多當時樂師或間歌其一二札因就所聞而評譏之孔説太拘葉夢得曰季札以小雅為周德之衰大雅為文王之德者小雅皆變雅大雅皆正雅也如楚荘王言武王克商作頌亦與今詩次序不同盖雅以正變為大小頌以所作為先後者詩未刪之序也論政事之廢與而以所陳者為大小推功德之形容而以可告者為先後孔子刪詩之序也今案葉氏此論似未必然録以備考見舞象箾南籥者象箾舞所執南籥以籥舞也皆文王之樂杜不解象南之義孔疏曰詩序維清奏象舞也即此象箾之舞南籥文舞象箾武舞也程大昌曰南籥者二南之籥鼓鐘之詩所謂以雅以南以籥不僣者也又杜不言箾是何物案下文韶箾與此象箾同義書稱簫韶司馬貞謂箾即簫也字體變耳或云説文箾以竿擊人也疑是舞人所執之竿竇儼大周正樂云舞箭謂之箾其説皆未識然否美哉猶有憾文王恨不及已致太平此服䖍舊説也然所謂有憾者盖自觀者言之惜其未身致太平耳三分天下有其二以服事殷文王之安之也久矣何恨之有三十年亥有二首六身亥字二畫在上併三六為身如筭之六下二如身是其日數也下亥上二畫豎置身傍邵文荘公曰二首亥字上二畫也六身亥字中三畫也三畫而謂之六者其形如筭之六也下二如身謂其下二畫亦如筭之六故曰如身盖古字體若此今案此説是也杜謂下亥上二畫竪置身傍是以如為往于義頗迂近世馬永卿所述劉安世之説亦同皆非也曰譆譆出出譆譆熱也説文譆痛也别出誒字云可惡之辭其下引傳此文不訓熱也及他字書皆無熱義杜以此叫呼者是火妖故謂譆為熱耳唯君用鮮鮮野獸宣十二年注新殺曰鮮取我衣冠而禇之禇畜也奢侈者畏法故畜藏禇衣之槖也成二年傳曰寘之褚中以出荘子曰禇小者不可以懐大三十一年冦盜充斥充滿斥見言其多斥大也廣也非薦陳之薦陳猶獻見也薦進陳設也天厲不戒厲猶災也言水潦無時天厲者天之厲氣猶周官司救所謂天患彼疏云水旱之烖疾病之害是也不戒言不為戒備我聞忠善以損怨為忠善則怨謗息忠善劉向新序作忠信是也文相近而譌耳豈不遽止然猶防川遽畏懼也召穆公諫厲王曰防民之口甚于防川川壅而潰傷人必多子産之言盖出于此漢賈讓亦云治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也辭意足與此相比顔師古曰遽速也周詩曰朋友攸攝攝以威儀攝佐也襄十四年傳注攝整也禮記緇衣引此詩鄭注云言朋友以禮義相攝正也左傳附注卷二

body:
  text: 左傳附注卷三明陸粲撰杜氏集解昭公元年其敢愛豐氏之祧祧逺祖廟䟽曰祭法云逺廟為祧鄭𤣥注祧之言超也超上去意也此公孫段是穆公之孫子豐之子其家唯有子豐之廟君若特賜或得立穆公廟耳無逺祖廟也杜云然者順傳文言之魏了翁曰祧者取廟外之兆域為義祧即廟耳非為親盡也自鄭康成以起訓祧後世皆承其誤襄九年季武子對晉侯云君冠以先君之祧處之其還及衛冠于成公之廟僅四世耳豈逺祖乎今案康成注祭法謂諸侯無祧及注聘禮不腆先君之祧則云祧始祖廟言祧者祧尊而廟親待賓客尚尊者斯特遷就之辭耳祭法所言晉張融以為皆衰世之制近世儒者盖多疑之孔於彼䟽中亦援此傳文云散而通論則凡廟曰祧盖亦覺鄭説之非也其謂豐氏無逺祖廟者良是而云以君賜或得立穆公廟則過矣記曰大夫不得祖諸侯而公廟之設於私家非禮也設服離衛二人執戈陳於前以自衞離陳也離猶離坐離立之離兩相麗也吾代二子愍矣二子謂王子圍及伯州犂圍此冬便􅆲位不能自終州犂亦尋為圍所殺故言可愍服䖍曰愍憂也代伯州犂憂公子圍代子羽憂子哲漢書五行志注引應劭解亦與服同其説是也帶其褊矣言帶褊盡故裂裳示不相逆褊狹小也言此帶其小矣范鞅請冠焉而叔孫婼與之兩冠曰盡矣杜注以為偽若不解其意者今豹之裂裳為帶意亦當爾處不辟汚汚勞事汚穢辱之事舉之表旗旌旗以表貴賤閔二年傳佩衷之旗也注旗表也表旗一義爾且此方論疆場之事何遽及貴賤乎劉用煕謂表旗猶表識盖以别封界者也周有徐奄二國皆嬴姓書序曰成王伐淮夷遂踐奄徐即淮夷書費誓云淮夷徐戎並興詩江漢以平淮夷常武以征徐方作也則二國自别逸周書稱三叔及殷束徐奄及熊盈以畔則徐奄盖助武庚為亂者子皮賦野有死麕之卒章義取君子徐以禮來無使我失節而狗驚吠喻趙孟以義撫諸侯無以非禮相加陵趙于常曰厖以喻楚諸侯惡公子圍故欲趙孟安徐馴擾之觀下文趙孟荅賦之語可見抑子南夫也言丈夫女以子南先聘已故言夫也下文云夫夫婦婦所謂順也其指可識矣終事八反每十里八乘車各以次載幣相授而還不徑至故言八反千里用車八百乘其所餘二百乘以自隨故言千乘案千乘之説先儒嘗辨其妄然傳言十里舎車不云每舎㡬乘杜縁八反之語遂為此言以求合千乘之數過矣鮮不五稔鮮少也少尚當歴五年多則不啻韋昭曰言鮮不至五年而亡也主民翫嵗而愒日翫愒皆貪也后子方譏趙孟意衰安得更謂之貪説文翫習厭也引此傳文别出忨字則引外傳忨嵗而日云忨貪也今當以前説為正愒與憇同息也翫愒皆偷安之意韋昭於外傳亦注云忨偷也崇卒也崇聚也崇之為言尊也謂崇尚步卒請皆卒去車為步卒自我始乃毁車以為行魏舒先自毁其屬車為步陳請皆卒自我始為句猶曰此法自我作古耳非謂先自毁其車也胡氏謂後世車戰法亡實啓於此於是乎節宣其氣宣散也宣通也節者為之節適孔疏以為時節非也二年敢拜子之彌縫敝邑彌縫猶補合也謂以兄弟之義此下語意不完當有逸文國則不共逆卑於送是晉國不共傳文云國則不共而執其使君刑已頗當讀至使字句絶盖曰齊國則不共矣而執其使則晉君之刑已頗言罪不在使人也杜誤斷其句三年不敢擇位而數於守適不敢以其位卑而令禮數如守適夫人數音義當如數其貴寵之數數於守適猶曰齒於守適爾君若不棄敝邑而辱使董振擇之以備嬪嬙董正也振整也董督也振猶舉也民人痛疾而或燠休之燠休痛念之聲燠休依注讀為嫗呴王若虚以為溫煦安息之意讀如本字亦通以樂慆憂慆藏也朱申曰慆慢也以淫樂而慢易憂禍也詩曰君子如祉亂庶遄已如行也祉福也言君子行福則亂庶㡬疾止也如若也祉朱傳以為猶喜也宣十七年范武子引此詩亦云君子之喜怒以已亂也盖君子喜則錫福故謂喜為祉及郊遇懿伯之忌敬子不入忌怨也懿伯椒之叔父敬子叔弓也叔弓禮椒為之辟仇忌謂忌日耳此觧及檀弓注疏所云皆瞽説也子雅不可曰彼其髪短而心甚長其或寝處我矣言不可信齊二十八年慶封聞子雅子尾怒告盧蒲嫳嫳曰譬之如禽獸吾寝處之矣故子雅云爾以復徃言謂彼雖衰老而故智尚存或能寝處我矣四年先王務脩徳音以亨神人亨通也劉向新序援此文亨作享古字亨享通晉君少安不在諸侯安於少小不能逺圖杜意以少安為幼小時躭於安逸也釋文謂少讀如字於義為勝少安猶叔向云晉少懦矣又晏子云後世若少惰外傳亦有若少安恐無及也之語雹可禦乎禦止也禦拒也禁也西陸朝覿而出之謂夏三月日在昴畢蟄蟲出而用冰春分之中奎星朝見東方既云夏三月又云春分之中不可曉疏雖强觧義終難通其引服䖍鄭𤣥二説服云春分奎始朝見月令仲春天子乃獻羔啟氷是也鄭云西陸朝覿謂四月立夏昴朝見即用禮夏班冰也劉炫謂鄭説近之民不夭札短折為夭夭死為札昭十九年傳注大死曰札此以大為夭文誤耳鄭衆云札疾疫死亡也越人謂死為札劉熙釋名云札截也氣傷人如有斷截也鄭𤣥亦讀札為截王使椒舉侍於後以規過規正二子之過謂規正㑹禮之失耳禮雖向戌公孫僑所獻然非二子身行之也何謂規其過乎寡君將堕幣焉敢謝後見恨其後至故言將因諸侯㑹布幣乃相見堕幣未詳注直云布幣疏以墮為輸引公羊傳輸平猶堕成為證然彼讀輸為渝渝變也故云堕敗其成耳於此義不相當也汰而愎諫愎狠也僖十五年傳愎諫注戾也毛晃曰咈也求之而至又何去焉言求食可得無為去豎牛盖杜洩力不能去設辭以免杜洩憾叔孫之召豎牛以致禍故言汝本自求之而至今又何用去之哀八年吳伐魯子服何謂孟懿子曰召之而至又何求焉語意與此相類五年舍中軍卑公室也罷中軍季孫稱左師孟氏稱右師叔孫氏則自以叔孫為軍名劉敝曰如杜所言則三軍猶在徒以軍為師名號少異耳何謂舍中軍乎今案魯之軍號傳所不言哀十一年雖稱左師右師疑亦臨時所命若晉之三軍楚之二廣有定制者傳則屢書之矣叔孫氏之軍名尤未見有據使亂大從使從於亂服䖍云使亂大順之道是也大順者適庶之常分鄭伯勞子蕩于汜勞屈生于菟氏汜莵氏皆鄭地晉侯送女于邢丘子産相鄭伯㑹晉侯于邢丘傳言楚强諸侯畏敬其使此注為鄭伯勞子蕩屈生發也當與上注相屬今斷向此盖傳寫誤民食于他他謂三家也言魯君與民無異程公説曰古者君養民民食於他者言民為三家所有也晉不失備而加之以禮重之以睦君臣和也睦睦於楚也傳曰衛事晉為睦叔禽叔椒子羽皆韓起庶子劉炫以為叔禽等亦韓起之族今案下文云皆大家也三人若是庶子不得稱家又云輔韓須楊石而不及叔禽等其非韓起之子明矣今此行也其庸有報志言吴有報楚意其庸者不敢必然之辭僖十五年傳曰晉其庸可冀乎今蹶由言此行也吳其庸有報楚之志為将待後舉若邲之報城濮者然六年始吾有虞於子虞度也言準度子産以為已法虞猶我無爾虞之虞言虞慮而敬憚之也糾之以政糾舉也糾督也督正之也詩曰儀式刑文王之徳日靖四方詩頌言文王以德爲儀式故能日有安靖四方之功刑法也又曰儀刑文王萬邦作孚詩大雅言文王作儀法為天下所信二注皆於經文不順徳今詩作典鄭箋云儀則式象法行文王之常道又云儀法文王之事則天下信而順之其説是也襄十三年傳引此詩杜觧云文王善用法亦誤七年暨齊平齊求之也齊伐燕燕人賂之反從求平劉敞曰杜説與傳意錯傳所云齊求之者指齊求與魯為平也其下乃云齊侯次于虢燕人行成若齊已暨燕平無緣復有兹事且齊伐燕燕人賂之傳當云燕求之暨燕平不當云齊求之暨齊平也以事推之自昭公即位未嘗與齊通好此年三月叔孫婼如齊涖盟此則魯與齊平之驗矣亦猶定十一年及鄭平叔還如鄭涖盟也章灼不疑魯衛惡之受其凶惡惡讀畏惡之惡惡之猶曰忌之爾襄二十八年傳周楚惡之注云周王楚子受其咎亦誤用物精多物權勢物疏謂奉養之物是也子皮之族飲酒無度相尚以奢相困以酒相尚以奢傳所不言於辭為衍且此亦何煩訓釋聖人之後也聖人殷湯而滅於宋孔子六代祖孔父嘉為宋督所殺其子奔魯世本家語並云孔父嘉曾孫防叔始奔魯家語又云以辟華氏之偪故今案嘉為莘督所殺其子辟禍應即時出奔安得至曾孫乃適魯乎杜説較近理特未詳所據耳王符氏姓志云孔父之子木金父始降為士故田滅於宋此説尤恐未然聖人有明徳者若不當世其後必有達人聖人之後有明徳而不當大位謂正考父孟僖子之意盖以正考父為聖人耳杜前既誤觧聖人為殷湯至此又横益其文為聖人之後孟非人也將不列於宗不可謂長跛足非全人不可列為宗主言不得在宗人之列也八年抑臣又聞之抑疑辭抑發語辭莫保其性性命也民不敢自保其性命顔師古曰性生也子盍謂之謂之使無攻我周書曰惠不惠茂不茂周書康誥言當施惠於不惠者勸勉於不勉者茂勉也謂之當連周書為句惠者順也盖令舉書辭以詔子良使順其不順而勉其不勉也猶將復由由用也由經也從也言將復經由鶉火之次乃亡魏了翁謂由義如尚書顛木之有由蘖今案由古字作㕀木生條也言陳將復興如已仆之木復生㕀蘖其義亦通九年豈如弁髦而因以敝之童子垂髦始冠必三加冠成禮而棄其始冠故言弁髦因以敝之此注未明尋杜意當謂加弁於髦因稱弁髦耳劉炫謂弁髦二物因以敝之者冠畢則棄弁親没則不髦也后稷封殖天下今戎制之不亦難乎后稷修封疆殖五榖今戎得之唯以畜牧上二年傳封殖此樹注封厚殖長是也制之亦言戎得制御之耳以封為修封疆制之為畜牧皆謬甚暴滅宗周宗周天子書多方王來自奄至於宗周疏曰此宗周即鎬京也祭統衛孔悝之鼎銘云即宫於宗周彼宗周謂洛邑也吕氏曰東遷之後都洛則洛亦謂之宗周王者所都天下宗之今案十六年傳引詩宗周既滅注亦云周為天下宗也而楚所相也相治也楚之先祝融為髙辛氏火正主治火事疏云相訓助是也言相助火政辰在子卯謂之疾日疾惡也紂以甲子䘮桀以乙卯亡故國君以為忌日王充論衡曰禮不以子卯舉樂殷夏以子卯亡也賈逵鄭𤣥皆同此義故杜用之漢書翼奉傳曰北方之情好也好行貪狼申子主之東方之情怒也怒行隂賊亥卯主之貪狼必待隂賊而後動隂賊必待貪狼而後用二隂並行是以王者忌子卯張晏曰子刑卯卯刑子相刑之日故以為忌而説者以為夏殷亡日不推湯武以興乎孔氏謂鄭衆注春秋其説亦如此今録以備一義又飲外嬖嬖叔外都大夫之嬖者荘二十八年注外嬖在閨闥之外者與此不同大抵言内嬖皆謂嬪御外嬖則謂羣臣耳成十七年注云愛幸大夫是也十年彼雖不信彼傳言者劉用熙曰彼謂欒髙也信猶實也言彼雖不實欲攻我庸愈乎罪惡不差於陳鮑愈猶勝也言欒髙庸勝於陳鮑乎戰于稷稷祀后稷之處釋文云稷地名六國時齊有稷下館是也斬焉在衰絰之中既葬未卒哭故猶服斬衰劉用熙曰縣子云三年之䘮如斬期之喪如剡斬謂哀痛之深如斬絶也以為斬衰者繆十一年物以無親物事也物猶人也言不恤小國之患故使物情不附朝有著定著定朝内列位常處謂之表著注衍表字劉炫云下文言㑹有表則此不得謂之表著也十二年毁之則朝而塴塴下棺俞琰曰塴字從土從崩當是既下棺而掩之以土也杜以塴為下棺非也今案説文云窆葬下棺也又云塴喪葬下土也禮謂之封周官謂之窆鄭衆觧周禮亦略同塴之與窆實則一事義小異耳齊將何事言晉徳不衰於古齊不事晉將何所事何事猶云能作何等事也言其無能為耳外彊内温忠也坎險故彊坤順故温彊而能温所以為忠外彊内温和以率貞二語取喻於卦象義雖近似然詳傳文云坤之比者謂坤卦之比爻耳故此下唯説黄裳元吉之義亦猶七年孔成子筮得屯之比止論利建侯不取比義文如崔杼得困之大過陽虎得泰之需其為説皆止取本爻不及變卦也且夫易不可以占險夫易猶此易夫語辭翠被以翠羽飾被被帔也古字通説文方言皆謂帬為帔帬下裳也祭公謀父作祈招之詩以止王心祈父周司馬招其名王肅曰祈招詩名猶齊景公作君臣相説之樂曰徴招角招者形民之力而無醉飽之心言國之用民當隨其力任如金冶之器随器而制形故言形民之力去其醉飽過盈之心案家語形作刑王肅注曰刑傷也刑傷民力用之不節無有醉飽之心言無厭足也李百藥封建論云或刑民力而將盡亦用此意十三年依陳蔡人以國國陳蔡而依之言依倚陳蔡之衆以立國耳是時倉卒起事何暇遽國陳蔡乎疏謂以國者許為復其國以此招慰之亦未然知擠于溝壑矣擠隊也説文擠排也乃有大事於羣望羣望星辰山川趙匡曰據禮篇云諸侯祭名山大川在其封内者不言星辰杜此説可疑趙子常曰舜典言望于山川不及星辰周禮典瑞言而圭有邸以祀地旅四望圭璧以祀日月星辰則星辰非望明矣杜説盖承賈逵服䖍之誤今案上七年傳並走羣望注云晉所望祀山川是也無與同好誰與同惡言棄疾本不與子干同好則亦不得同惡案服䖍云言子干無黨於内誰當與共同好惡者杜專指棄疾非也瀆貨無厭瀆數也瀆與黷通説文黷握持垢也一曰蒙也瀆貨猶曰冒于貨賄爾不明棄共百事不終所由傾覆也信義不明則棄威不威棄禮無禮無經無經無業故百事不成劉炫曰既言不明棄共則當云不共棄序不序棄經不經棄事乃順傳文貢之無蓺蓺法制文六年傳陳之蓺極注引此傳文云蓺準也以幕蒙之蒙裹也蒙覆冒也懐錦奉壺飲氷以蒲伏焉蒲伏竊往飲季孫冰箭筩盖可以取飲詩鄭風抑釋掤忌毛傳云掤以覆矢先儒相傳謂氷與掤通故此年及二十五年注皆訓為箭筩盖然彼文云釋甲執氷或當如杜義此云飲氷即是氷耳邵文荘公曰飲氷以壺藏於氷也猶飲羽之飲十四年臣欲張公室也張强也以張為强義亦少迂宣公十八年注張大公室是也宥孤寡寛其賦税服䖍以為寛赦其罪是也孤寡尤可哀矜故特言之與下文赦罪戾自不相妨已惡而掠美為昬掠取也昬亂也掠奪取也昬謂不知義理曰義也夫可謂直矣於義未安直則有之猶義也夫三罪唯荅宣子問不可以不正其餘則以直傷義故重疑之元凱此論先儒或譏其失然叔向之處三事亦未盡合義傳中此類亦非仲尼之言辨見别録十五年王一嵗而有三年之䘮二焉天子絶期唯服三年故后雖期通謂之三年䘮此觧未暢孔疏備矣一動而失二禮無大經矣失二禮謂既不遂服又設宴樂朱申曰失二禮謂因䘮求器又宴樂以早十六年執政禦之禦止也禦拒也刑之頗類縁事類以成偏頗此觧於文不順服䖍讀類為纇云不平也子産賦鄭之羔裘取其彼已之子舍命不渝邦之彦兮以美韓子不渝下脱邦之司直四字十七年辰不集於房集安也房舍也日月不安其舍則食書孔傳曰集合也不合則日食可知疏曰左傳言日月之㑹是謂辰日月當聚㑹共舍今不合於舍則月體掩日而食矣或以房為房星非也唐歴志曰古文集與輯同日月嘉㑹而隂陽輯睦若變而相傷則不輯矣其説皆無杜不同今除於火火出必布焉今火向伏故知當須火出乃布散為災朱申曰言今火向伏而彗以除之所謂除舊明年大火星出必布散為災所謂布新也瓘斚玉瓉瓘珪也斚玉爵瓉勺也説文瓘玉也下引此傳文盖瓘斚者以瓘玉為斚耳與下玉瓉相對非珪也十八年大人患失而惑又曰可以無學無學不害患有學而失道者以惑其志患失猶論語云患失之矣言大人懼違衆而失位其志意惑亂故狥流俗之説而曰可以無學也振除火災振棄也爾雅振訊也郭璞注奮迅也此下孔疏言振訊除去火災是也子大叔之廟在道南其寝在道北其庭小庭蒐塲也過期三日處小不得一時畢庭謂廟寝之間也以其小不便於蒐當除之使廣而大叔不忍毁廟故過期三日須子産見之有後命也許曰余舊國也許先鄭封鄭曰余俘邑也隠十一年鄭滅許而復存之故曰我俘邑十二年傳楚靈王云伯父昆吾舊許是宅今鄭人貪賴其田襄十一年傳東侵舊許杜注云許之舊國鄭新邑盖許遷而鄭得之故今許人謂鄭曰爾之地乃余舊國也鄭人謂詩曰爾之國乃余俘邑也言其兩不相下耳苟謂許先鄭封而自稱舊國則鄭亦自謂俘邑乎十九年寡君之二三臣札瘥夭昬大死曰札小疫曰瘥短折曰夭未名曰昬國語無夭昬札瘥之憂韋注云狂惑曰昬疫死曰札瘥病也又君子失心鮮不夭昬注云昬狂荒之疾也此云大死小疫似未有據且傳言寡君之二三臣則不得為未名矣後年晏子論祝史亦曰夭昬孤疾則韋説為是私族於謀而立長親於私族之謀宜立親之長者私族於謀盖言私謀於族倒字以成文耳如云室於怒市於色又云魯故之以二十年梓慎望氛時魯侯不行登臺之禮使梓慎望氛此或梓慎自望見之如十八年登大庭氏之庫以望火耳何由知魯侯不行登臺之禮鄭𤣥注周禮馮相氏云世登髙臺以觀天文然則此因日官之世業也狎齊豹狎輕也襄六年傳少相狎注狎親習也私欲養求養長也言以私欲長養其所求欲日益縱則求亦日益廣也四物雜用四方之物以成器四物未詳此强觧耳七音周武王伐紂自午至子凡七日王因以數合之以聲昭之故以七同其數以律和其聲謂之七音此注實采國語之文然云自午至子凡七日不用彼所言七列七同者未測杜意劉炫以此為疑孔疏謂尚書國語事得兩通此曲説也柔逺能邇以定我王柔安也逺者懐附近者各以能進則王室定詩朱傳曰能順習也不競不絿不剛不柔絿急也朱傳以絿為緩是也不競不絿猶曰不耆不懦爾義與下不剛不柔相比二十一年使有司以齊鮑國歸費之禮為士鞅牢禮各如其命數魯人失禮故為鮑國七牢劉炫曰聘禮卿之饔餼五牢則牢禮不必依命數鮑國禮當五牢加二牢耳子無我迋迋恐也定公十年傳迋吾兄也注迋欺也詩鄭風人實迋汝毛傳云迋誑也二十二年王與賓孟説之欲立之王語賓孟欲立子朝為太子説讀為悦林堯叟云王與賓孟皆喜子朝也依杜觧則説音如字非是二十三年使各居一館分别叔孫子服回賈逵以為使邾魯大夫各居一館是也下言士伯聽其辭而愬諸宣子乃皆執之者亦執諸大夫也劉用熙曰邾魯彼此有曲直故皆執之終以邾直多故先歸邾子南宫極震為屋所壓而死趙子常曰言南宫極震是以震死非為屋所壓也吳大子諸樊入郥諸樊吳王僚之大子孔陸皆云吴子諸樊是王僚伯父何容僚子乃與同名恐傳寫誤耳徐天祜云襄二十五年經書吴子遏伐楚門于巢卒杜注遏諸樊也傳亦書諸樊卒至是僅三十年杜不辨此傳之誤亦依文觧之謬矣今案史記吴世家書此事以為公子光是也二十五年五牲麋鹿麏狼兔疏曰十一年傳曰五牲不相為用注云牛羊豕犬雞此異彼者以上文已言六畜故别觧之用鄭𤣥六獸之説去野豕而以其餘當之也六畜五牲三犧總是此物随所用而異其號也杜觧五牲前用爾雅後從鄭𤣥於彼所釋六者之名各損其一取決肺膓自相乖背良可怪矣服䖍觧三犧為雁鶩雞亦非是三犧猶詩言三物云爾九文謂山龍華蟲藻火粉米黼黻也華若草華藻水草火畫火粉米若白米黼若斧黻若兩已相戾書孔傳曰華象草華蟲雉也説者謂此言象草華之蟲為雉也周禮司服鄭注亦以華蟲為一物此注釋華而不及蟲疑有逸文五章以奉五色集此五章以奉成五色之用傳文云為九文六采五章以奉五色杜斷五章以下為句誤也為父子兄弟姑姊甥舅昏媾姻亞以象天明六親和睦以事嚴父若衆星之拱辰極也上注以天明為日月星辰今此亦言其親踈倫序比象於文之行列爾何乃頓異其説乎簡子曰鞅也請終身守此言也鞅能守此言故終免於晉陽之難鞅以晉陽叛後乃滅范中行氏而專晉國迹其行事無君臣上下之禮甚矣安在其能守此言也杜説亦以成敗論人爾相其室相治也襄十九年傳相子革子良之室注云相助其子是也此之謂不能庸先君之廟不能用禮也盖襄公别立廟周衰禮廢諸侯典祀盖有獨豐於昵者如閔二年禘于荘公趙匡曰不及于祖也今此禘于襄公亦然杜皆謂别立廟誤矣武宫煬宫之立經傳皆書之即别立此二公廟無縁不書生心同求將合與季氏同求叛君者同求所謂同惡相求而何守焉何必守公謂何必守盟誓之言也二十六年王心戾虐萬民弗忍居王于彘不忍害王也劉炫曰不忍者不能忍王之虐也今案周語祭公謀父曰商王帝辛大惡於民庶民弗忍欣戴武王以致戎於商牧彼文亦謂弗堪忍其惡也張衡東京賦云百姓不能忍是用息肩於大漢而欣戴髙祖正用其語諸侯釋位以間王政間猶與也去其位與治王之政事史記言厲王奔彘周召二相行政號曰共和然漢書古今人表有共伯和顔師古曰共國伯爵和其名史遷之言未可據也汲冡紀年亦云厲王既亡有共伯和者攝行天子事又荘子稱共伯得乎共首司馬彪曰共伯名和諸侯知其賢請以為天子即王位十有四年大旱屋焚卜曰属王為祟召公乃立宣王共伯復歸於宗逍遥得意共山之首吕氏春秋云共伯和其行好賢仁周厲之難天子曠絶而天下皆來請矣據此諸書所説皆同則釋位以間王政者共伯其人也矯誣先王先王謂景王疏曰謂矯景之命立猛上文云謂先王何常之有斯即所謂矯誣者矣一篇之中言先王者皆謂先世之王不應於此獨指景王也然稱先王則景固在其中矣二十七年王可弑也母老子弱是無若我何猶言我無若是何欲以老弱託光王肅云專諸言王僚母老子弱也又史記呉世家説此事云王僚可殺也母老子弱而兩公子將兵攻楚楚絶其路方今吳外困於楚而内空無骨鯁之臣是無奈我何文意尤明司馬貞云服䖍杜預見左傳下文曰我爾身也以其子為卿遂强觧云云語不近情過為迂回非也蒙王與令尹以自利也蒙欺也蒙覆也言欺㒺其上若覆蔽之然也諸言相蒙蒙其先君之類意皆如此季氏之復天救之也復猶安也季氏見伐㡬亡而復存故謂之復而弗敢宣也宣用也宣布也言其自抑不敢宣布權寵事君如在國書公行告公至是也趙子常曰事君如在國即後賈馬歸從者衣屨之類此季孫之姦也杜以書行告至當之謬矣使宰獻而請安比公於大夫也禮君不敵臣宴大夫使宰為主請安齊侯請自安不在坐也劉炫謂燕禮司正命卿大夫以安今此傳所言亦當如彼請魯侯自安耳杜云齊侯不在坐非也孔疏援鄉飲酒禮以請安于賔乃是常事未見卑公之意以劉説為非然彼禮是卿大夫所行者兩君相見安得以為比而謂請安為常事乎杜偶不考儀禮故致斯誤耳二十八年慭使吾君聞勝與臧之死也以為快慭發語之音哀十六年不慭遺一老注云慭且也與此不同國語韋昭注云憖願也屬厭而已屬足也韋昭曰屬適也厭飽也言適可飽足則止二十九年人實不知非龍實知言龍無知乃人不知之耳言人自不智無擾畜龍之術耳非龍之有智也夏后嘉之賜氏曰御龍夏后孔甲以更豕韋之後更代也以劉累代彭姓之豕韋累尋遷魯縣豕韋復國至商而滅累之後世復承其國為豕韋氏此謂以御龍更豕韋之後自夏已然矣據鄭語云彭姓豕韋則商滅之而襄二十四年傳范宣子亦自稱其祖在夏為御龍氏在商為豕韋氏與蔡墨之語不同故杜為委曲通之如此然於傳記未有考也木正曰句芒取木生句曲而有芒角也白虎通曰芒之為言萌也其義近是古音萌與芒通有烈山氏之子曰柱為稷烈山氏神農世諸侯案孔疏曰魯語及祭法皆云烈山氏之有天下也其子能殖百榖故祀以為稷賈逵鄭𤣥皆謂烈山炎帝之號即神農也然則杜注之誤明矣孔既知之乃復曲為辨觧亦黨同之過也遂賦晉國一鼓鐵以鑄刑鼎令晉國各出功力共鼓石為鐵計令一鼓而足家語亦説此事王肅注云三十斤謂之鈞鈞四謂之石石四謂之鼓小爾雅所説同杜云一鼔而足殆非也三十年共其職貢與其備禦不虞之患豈忘共命言不忘共命以所備御者多不及辦之不虞之患若軍旅䘮葬之類出於意外者言此等皆不敢忘共命非謂不及辦也若其不閒雖士大夫有所不獲數矣不得如先王禮數言不得備數以充使也敝邑之少卿少年少也少卿言其位卑猶云介卿亞卿矣若好吳邉疆使柔服焉柔服謂不與吳搆怨朱申曰使呉人柔順而服從也若為三師以肄焉肄猶勞也釋文云肄一本作肆今案文十二年河曲之戰云使輕者肆焉注謂肆暫往而退也與此傳所謂彼出則歸彼歸則出意正相類於義為長三十一年寡君其罪之恐敢與知魯國之難言恐獲不納君之罪今納而不入何敢復知耶荀躒以昭公言切故云寡君尚自恐得罪又敢與知魯國之難耶不為利回回正心也此語未詳或云回正心者回改其正直之心竊尋元凱諸注語皆簡明此獨晦澁恐文有脱誤攻難之士將奔走之攻猶作也攻撃也言好攻擊作難之士也以作訓攻非其義矣上之人能使昭明上之人謂在位者在位者能行其法非賤人所能言在位者能使春秋之義昭明則足以勸善懼淫如下文所云也三十二年崇文徳焉所以崇文王之德劉炫以為崇文德之教是也定公四年嘖有煩言莫之治也嘖至也煩言忿争管子嘖室之議房𤣥齡曰謂議論者言語讙嘖荀子嘖然而不類揚倞曰嘖爭言也此云嘖有煩言若曰嘖然有煩亂忿爭之言耳五叔無官五叔管叔鮮蔡叔度成叔武霍叔處毛叔耼逸周書及史記皆云毛叔名鄭此作耼誤也且耼季是毛叔弟何容乃取兄名為封國之號斯必不然矣陶淵明集聖賢羣輔録作毛叔圉吾子欲復文武之略略道也成二年傳侵敗王略注經略法度也奔食而從之敗諸雍澨五戰及郢奔食食者走不陳故不在戰數疏曰自小别至于大别三戰也柏舉也清發也此已五矣若復數雍澨則為六也傳例皆陳曰戰奔食則不暇為陳故不數也清發之戰半濟而擊之則亦非皆陳而戰矣何得數之為五也盖自小别至大别三戰自柏舉至此又五戰則雍澨亦在其數但傅文髙簡舉其大略耳以奨天衷奨成也僖二十八年皆奨王室注奨助也不敢以約為利此約謂要言也此一時之事非為徳舉故辭不敢見亦不肯為盟此約與上乘人之約義同謂不敢乗君父困約之時以為利也未獲所伏伏猶處也伏隱也謙言未獲所竄隠之處五年改步改玉昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位則亦當去與璠周語晉文公請隧王弗許曰改玊改行韋昭云佩玉所以節行步君臣遲速有節言服其服則行其禮晉侯尚在臣位不宜有隧也今仲梁懐之言亦此意若曰季孫人臣未改君步則不宣改玉矣杜謂季孫前此嘗佩璵璠祭宗廟未必然也子西曰請舍懐也以初謀弑王也王曰大徳滅小怨道也終從其兄免王大難是大徳尋傳所記鬬懐但有弑君之謀曽無從王之績昭王此意當是以其兄鬬辛之故若曰以兄之徳滅弟之怨耳八年主人出奔師攻郛人少故遣後師走往助之疏曰賈逵以為主人出魯師奔走而卻退也若從賈言則是敗還下傳陽虎何得云猛在此必敗明其時不敗故猛得逐廪丘人也賈説是其曰奔走卻退者暫退耳不謂戰敗而奔也與陽虎之言自不相妨捘衛侯之手及捥捘擠也血至捥趙子常曰傳不言見血杜説甚矣戴侗曰捘若但為推擠則不當言至捥今案字書捘一作捽持頭髪也捽是捉持之意捘義亦當然耳桓子咋謂林楚咋暫也咋音詐語聲也一音責大聲也依注則當為乍非也而先皆季氏之良也爾以是繼之欲使林楚免已於難以繼其先人之良疏曰言汝先祖以來皆為季氏之良臣汝今不良以是殺我之事繼續之此説於義為長九年子明謂桐門右師出右師樂大心子明族父右師往到子明舍子明逐使出門去劉用熙曰子明盖與右師同居古者同族居有東西宫南北宫出謂逐之使出而别居也其帥又賤帥謂東郭書劉炫云傳所陳東郭書之事皆非将帥若書為帥則人無不識何故云晢幘而衣貍製齊侯使視之乃知夫子也又書既為帥而被晉之敗何齊君乃以為功而更受賞乎此説是也彼賓旅也言彼與我若賓主相讓旅俱進退案犁彌與東郭書讓登猶不相識盖是異國之人新為齊臣者故書謂之賓旅猶后子目子干為羇矣十年於神為不祥盟将告神犯之為不善案説文祥福也一曰吉也杜每以善訓祥然有不盡合者如昭三年晏子云違卜不祥哀十四年鉏商獲麟以為不祥十六年白公曰弑王不祥石乞曰以敬事神可以得祥此等若一訓為善則難通矣十二年與其素厲寧為無勇素空也厲猛也言伐小國當如畏者以誘致之滑羅以曹國小弱無追兵故言與其殿而空設嚴猛寧為無勇耳不欲虚當為殿之名也十三年乃如之而歸之于晉陽欲如是謀而後歸衛貢乃如之者與上十年使如之義同盖實侵齊而歸衛貢非謂欲如是謀也哀公元年夫屯晝夜九日夫猶兵也壘未成故令人在壘裏屯守蔡劉炫謂夫役屯聚晝夜不止九日而築壘成此説是也不失舊物物事也不失舊物謂能復故業也不可食已食消也已止也食義見僖十五年已語辭吾先大夫子常易之易猶反也易讀如易晉易秦之易言輕易之也次有臺榭陂池焉再宿曰次疏曰荘三年傳例一宿為舍再宿為信過信為次言夫差所停三日則役民為此也杜云再宿曰次誤矣孔謂所停三日則役民為此亦未必然此直言其所次止之處則有觀㳺之樂耳二年陽虎曰吾車少以兵車之斾與罕駟兵車先陳斾先驅車也以先驅車益以兵車以示衆此觧未暢案襄十八年晉人伐齊斥山澤之險斾而疏陳之使乘車者左實右偽以斾先今以兵車之斾亦此意盖設斾於車盛為軍容與罕駟兵車在前者相對結陣罕駟自後至見之必懼其衆也鄭勝亂從釋君助臣為從於亂亂從與昭五年使亂大從義同三年庀女而不在死庀具也庀者省録之意周禮大胥比樂官鄭大夫讀比為庇云録具之也四年隂地之命大夫士蔑命大夫别縣監尹疏曰楚官稱尹故以尹言隂地之命大夫是晉臣非楚官也安得稱尹注誤爾六年需事之下也需疑也説文需須也待也戰于荘敗荘六軌之道馬永卿曰孟子稱荘嶽之間盖齊國繁㑹之地襄二十八年慶封反陳于嶽此云戰于荘皆齊中里名也再敗楚師不如死前已敗於柏舉今若退還亦是敗劉炫云再敗謂今戰更敗也今案此下云弃盟逃讎方説退意則此再敗之義當如劉説潛師閉塗潛師密發也閉塗不通外使也司馬貞曰閉塗即禮記所云菆塗者謂匿其䘮也今案徐廣曰塗一作壁又列女傳亦作壁壁軍壘也七年上物不過十二上物天子之牢上物亦通言之如冕與旂俱十二旒玉路樊纓十二就之類皆是不専謂牢而牢亦在其中矣八年及吳師至拘者道之以伐武城克之鄫人教吳必可克疏曰杜意以下傳始云王犯嘗為之宰澹臺子羽之父好焉國人懼懼者謂武城邑懼子羽之父為呉内應則是此時未得武城故知言克之者是鄫人教吴之語劉炫以為實克武域國人懼者懼其害魯非也傳言伐武城克之其文甚明子羽之父雖武城人此時盖在魯故國人懼其為内應耳劉説於傳文為順未可非也景伯負載造於萊門以言不見從故負載書将欲出盟劉炫謂載非載書盖負載器物欲往為質此説是也載當依釋文作戴詩載弁俅俅讀曰戴荀卿書戴子作載子盖古字通十一年子羽鋭敏鋭精也鋭利也人尋約吳髪短約繩也八尺為尋吳髪短欲以䋲貫其首説文尋繹理也尋約者使尋理䋲約以待用也使於齊屬其子於鮑氏為王孫氏私使人至齊屬其子改姓為王孫欲以辟吴禍史記説苑吴越春秋皆云吳王使子胥於齊子胥屬其子於齊鮑氏而還報吳是謂子胥實身自使齊矣與杜説不同十二年孔子與弔適季氏季氏不絻放絰而拜孔子始老故與弔絻䘮冠也孔子以小君禮往弔季孫不服䘮故去絰從主節制孔疏云禮弔無拜法曲禮曰凡非弔䘮非見國君無不荅拜者鄭𤣥曰䘮賔不荅拜不自賔客也今案依此禮則言孔子拜者誤家語作投絰而不拜亦非是弔於禮自無拜法何假言不拜也又今之家語辭多鄙近孔疏盖屢譏之矣此等皆依放傳文為之必若所云則是聖人貶禮以狥强臣乎竊疑傳文當以季氏不絻放絰而拜為句盖言其不著䘮冠又去絰而拜耳傳以是志禮之變非謂孔子去絰拜也更詳之十三年肉食者無墨墨氣色下韋昭曰墨黒氣也佩玉橤兮橤然服飾備也説文橤垂也十四年子我夕夕視事昭十二年傳右尹子革夕注云夕暮見也栁宗元朝日説引此傳文亦以為暮見長而上僂肩背僂通俗文曰曲脊謂之傴僂成子兄弟四乘如公成子之兄弟昭子荘簡子齒宣子夷穆子安廩丘子意兹芒子盈惠子得凡八人二人共一乘史記齊世家司馬貞注云世本陳僖子乞産成子常以下凡七人若昭子則桓子之子成子之叔父又不名荘田完世家云田常兄弟四人如公宫此稱四乘謂兄弟四人乘車而入非二人共乗也其三人不見者盖時或不同入公宫不可彊以四乘為八人増叔父為兄弟之數此服䖍杜預之失也今案孔疏亦引世本以昭子荘為僖子之子與司馬氏之説不同疑其欲成杜義而妄言耳侍人禦之子我侍入公之侍人也故得在内而禦陳氏野曰嘗私焉嘗試也言已嘗與在師私暱猶云吾嘗獲私於夫子爾傳曰欒盈佐魏荘子於下軍獻子私焉十五年寡君使盖備使備猶副也備具也言備使數而已廢日共積廢行道之日以共具殯歛所積聚之用共積謂共給委積也利不可得而䘮宗國将焉用之䘮宗國謂以邑入齊使魯有危亡之禍䘮失也背魯出奔是自失其宗國十六年旻天不弔弔至也弔恤也言不相恤也傳每言不弔杜亦多訓恤此與昭二十六年羣不弔之人皆訓至誤也鄭衆周禮觧引此傳文作閔天不淑不慭遺一老慭且也不憖遺一老詩十月之交文鄭箋曰慭者心不欲而自彊之辭爾雅曰憖彊也説文憖説也甘也其下亦引此傳語皆與杜義不同周仁之謂信周親也周備也至也周仁猶孟子云周於徳楚未節也言楚國新復政令猶未得節制言國力未紓尚不得節適非謂政令也以險徼幸者其求無饜險猶惡也記曰小人行險以徼幸鄭𤣥曰險傾危之道也十七年數之以三罪而殺之三罪紫衣袒裘帶劒良夫乘衷甸兩牡僣卿當為罪之一若三罪不數衷甸則傳何用言之又袒裘不釋劔而食總是一事不得分為二罪也大子又使㧻之㧻訴父欲速得其處㧻與諑古字通楚詞謡諑謂余以善淫王逸曰方言楚以南謂愬為諑又譛也吕氏春秋曰㧻崔杼之子令之爭令尹有憾於陳十五年子西伐吳陳使貞子弔吳以此為恨有憾於陳不知何事殆非為貞子弔也衡流而方羊裔焉横流方羊不能自安方羊通作彷徉爾雅曰徒倚也二十年欲除不忠者以説于越吳人殺之言其不量力慶忌能諫吴子且欲除不忠者雖智不足其志亦可哀也杜獨譏其不量力過矣史黯何以得為君子晉史黯云不及四十年呉當亡吳王感問此也此亦杜意之耳彼晉史之語吳王何自得開乎二十三年其可以稱旌繁乎稱舉也劉用熙曰稱讀稱副之稱謙言不腆之馬不知能稱旌繁之飾否也二十四年是躗言也躗過也躗者踶蹋之義此當作㦣説文字林皆云㦣㝱言不慧也三蒼云詤言廣雅云寱言也此謂晉人妄語若㝱中詤寱之言耳二十七年季康子卒公弔焉降禮禮不備也言公之多妄降禮猶云降於䘮食言公過自貶屈也左傳附注卷三

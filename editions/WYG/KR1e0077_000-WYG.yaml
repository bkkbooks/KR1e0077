body:
  text: 左傳附註春秋類提要臣等謹按左傳附註十卷明陸粲撰粲字子餘長洲人嘉靖丙戌進士官至工科給事中以劾張璁桂蕚謫都鎮驛驛丞終於永新縣知縣事迹具明史本傳是編前三卷駁正杜預之注義第二卷駁正孔頴達之疏文第五卷駁正陸徳明左傳釋文之音義多旁採諸家之論亦間斷以已意於訓詁家頗為有禆顧炎武日知録于駁正左傳注後附書曰凡邵陸傅三先生所已辨者不録邵者邵寳左傳觿傅者傅遜左傳屬事陸即粲也葢炎武亦甚重此書矣粲又有春秋左傳􅒢二卷大意以左傳為戰國人作而劉歆又以意附益故徃往卑賤不中道或為竒言怪説騖于末流考粲以左傳為出戰國葢因程子謂臘為秦禮庶長為秦官已為膠固其以竄亂歸之劉歆葢因林栗謂左傳凡言君子曰是劉歆之詞尤無佐證未免務為髙論仍蹈明人臆揣之習所謂畫蛇添足者也故惟録此編而左傳鐫則别存其目焉乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:dbf8410963ad7f77175d47c8b23a9343e38383d9e1193054286a84855d878f7f

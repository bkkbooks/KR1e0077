front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0077_WYG_006-1a, image: WYG0167/WYG0167-0746c.png}
body:
  text: 左傳附注後録明陸粲撰傳文疑誤者三十有八注疏中已辨正者不録下放此隱公八年諸侯以字為諡諡字誤說見附注桓公十七年日官居卿以砥日禮也日御不失日以授百官于朝郭定襄曰日官居卿以砥日其義迂晦不可解禮也二字疑當在于朝之下或傳寫倒錯也漢書律歷志于朝下有言告朔也四字顔師古曰劉家本有此語今案此志上文方論告朔之義故以此語終之乃劉歆論說之辭非傳文也顔誤爾僖公十五年張脉僨興杜注僨動也案僨僵也似非動義疑當作濆湧也或作墳起也二十三年公子賦河水杜注云逸詩義取河水朝宗于海海喻秦今案國語韋昭注云河當作沔字相似而誤也其詩曰沔彼流水朝宗于海文公七年乃背先蔑而立靈公以禦秦師云云先蔑將下軍先都佐之敗秦師于令狐啖助曰上言背先蔑立靈公明蔑在秦也次言先蔑將下軍則是在晉也何其自相戾蓋先蔑時為下軍將而身在秦故致誤爾趙子常曰蔑既逆雍于秦則必不肯將兵以拒秦苟已將兵拒秦豈容復奔秦耶理無可通傳誤明矣十一年齊襄公之二年鄋瞞伐齊王子成父獲其弟榮如襄公字誤當作惠公說見附注宣公三年石癸曰吾聞姬姞偶其子孫必蕃姞吉人也后稷之元妃也丘光庭曰石癸所言是論佶字之義字當從人從吉後代改之從女若從女安得吉人之語乎十二年仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以務烈所可也上言兼弱下言撫弱疑撫即兼之訛耳成公五年山有朽壤而崩壤國語作壞韋注云不言政失所為而稱朽壞言遜也今案壤壞二文相近故訛然說文釋崩亦曰山壞也六年易覯則民愁民愁則墊隘疑當作易覯則墊隘墊隘則民愁說見附注七年以兩之一卒適吳舍偏兩之一焉案杜注謂司馬法百人為卒二十五人為兩若如所言是卒大於兩傳文當云卒之一兩不當云兩之一卒也舍偏兩之一焉此語亦難曉孔疏亦云丘明為傳辭皆易解此獨蹇澀或有誤文十三年能者養之以福漢書律歷志引此文作養以之福顔注之往也往就福也此下孔疏亦云往適於福又云將身向福也疑舊本與漢志同今本蓋後人更定耳楊用修曰漢酸棗令劉熙碑猗與明哲秉道之樞養以之福惟德之偶此亦可取證十六年子在君側敗者一大杜注云一大謂軍大崩也今案此文未明疑一當作益十八年欲無犯時四字與上文不類當在後民無謗言之上襄公九年陳畚梮當作梮字書梮土舉也字從木梮㦸持也字從手漢五行志作輂是以日知其有天道也日字疑誤十四年若困民之主匱神乏祀釋文云乏杞本或作之祀誤也王若虛曰詳文勢之字非誤而所謂困民之主者乃復可疑蓋上言神之主民之望下言百姓絶望社稷無主文皆相應不宜於此獨以主字屬民或當作生今案國語虢文公云匱神之祀而困民之財其文足與此相比作之為是又說苑引此傳文作困民之性乏神之祀古字生性通周禮辨五土之物生杜子春讀為性即其例也王說得之二十五年屈蕩為莫敖杜注云宣十二年邲之役楚有屈蕩為左廣之右世本屈蕩屈建之祖父今此屈蕩與之同姓名史楠曰屈氏楚惟一族非他姓之泛然者使出於其族而同名是不諱其祖父也必傳之誤二十七年匹夫一為不信猶不可單斃其死此文難通孔疏云匹夫一為不信猶尚不可况國卿也不信之人盡踣其死若依此說則其當作以三十一年繕完葺墻李涪刋誤曰墻壞葺之而已何云繕完此當是繕宇葺墻宇誤為完也書曰峻宇雕墻足以為比𨽻人牧圉各瞻其事杜注云瞻視客所當得劉用熙曰瞻當作贍我聞忠善以損怨忠善新序作忠信是也善乃信之訛耳昭公元年其何實非命劉用熙曰實疑適字之誤三年豈惟寡君舉羣臣實受其貺其自唐叔以下實寵嘉之舉當作與孔氏以為舉朝羣臣非也魯語臧文仲告糴于齊曰豈惟寡君與二三臣實受君賜其周公太公及百辟神祗實永饗而賴之其文與此正同五年君將以親易怨疑作以怨易親六年徐儀楚聘于楚說文作徐䣡楚云䣡臨淮徐地徐鍇繫傳曰杜預但言儀楚徐大夫不言䣡是地名據許慎所言則楚是其名䣡是所食之邑然則當後漢時春秋傳文儀楚作此䣡字也七年說也為身無義而圗說此語難曉疑有剩少錯誤叔父陟恪詩大雅文王陟降朱傳引此文云恪者降字之誤十二年供養三德為善三當作二二德者即上文忠與共是也杜注以洪範正直剛克柔克者當之與上文不相蒙直强說耳形民之力而無醉飽之心形家語作刑說見附注二十一年華氏居廬門以南里叛依經文當作居廬門南里以叛二十三年吳大子諸樊入郥孔陸皆云諸樊字誤今案史記楚世家說此事以為公子光是也定公八年魯人聞余出喜於徴死杜注云徴召也陽虎召季氏於蒲圃將殺之今得脫必喜故言喜于召死今案上文林楚曰陽虎為政魯國服焉違之徴死此陽虎自言當云魯人聞余出喜於脫死不當云徴死也徴字誤耳哀公元年器不彤鏤彤當作雕文相近而訛也家語車不雕幾器不雕鏤六年潛師閉塗列女傳作閉壁十年吳延州來季子救陳啖助曰左氏事迹倒錯者甚多此季子帥師當在前數十年由作傳之人采舊說既多故不免有所交錯劉敞曰推驗季子之年僅百嵗矣以彼清髙寧貪將亂國之兵者耶似異時事傳附著為說耳十一年有子曰就用命焉劉敞曰有子當為子有冉求字也二十七年大國在敝邑之宇下當云敝邑在大國之宇下文顛錯耳昭十三年衛屠伯謂叔向曰衛在君之宇下此其例也衍脫者一十有六莊公二十二年有山之材而照之以天光於是乎居土上故曰觀國之光利用賓于王下云庭實旅百奉之以玉帛天地之美具焉故曰利用賓于王則此不當重說劉用熙以此五字為衍文是也僖公十五年子金教之言曰朝國人而以君命賞云教之足矣又加言字贅也疑衍三十二年爾何知中夀爾墓之木拱矣此文意頗不屬疑中夀上下有脫字文公七年此諺所謂庇焉而縱尋斧焉者也楊用修云一本焉下有斯之二字唐人文集引此云䕃其樹者不折其枝庇焉而縱尋斧焉以斯之可乎此說未知然否録以備考宣公十七年昔者諸侯事吾先君皆如不逮舉言羣臣不信諸侯皆有二志不逮與下舉言意不屬當有闕文成公二年若苟有以藉口而復於寡君一本無若字是也十三年我寡君是以有令狐之㑹杜注云宜言寡人稱君誤也今案上文云我是以有令狐之役我是以有河曲之戰我是以有輔氏之聚此準上例則寡君當為衍字襄公六年晏弱圍棠十一月丙辰而滅之衍而字十九年圭媯之班亞宋子而相親也士子孔亦相親也案此云亦相親也不言所親何人下文云司徒孔實相子革子良之室杜注云與二父相親故相助其子然則士子孔之上當脫子然子孔四字二十九年為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎杜云美其有政治之音譏其煩碎知不能久今案鄭無裦辭與下文陳同美哉二字當為衍文史記無三十一年其下畏而愛之準上文此下宜有則而象之四字昭公元年將㑹孟子餘㑹下脫祭字五年離火也艮山也離為火火焚山山敗劉用熙曰離為火三字於上下文不通貫疑衍文也二十年是以鬼神不饗其國以禍之衍之字哀公四年諸大夫恐其又遷也承胡氏以承為衍文是也杜訓為懲直强解耳十六年晉人使諜於子木請行而期焉此語不可曉疑而字衍杜注云請行襲鄭之期也亦難通重出者六宣公九年孟獻子聘於周王以為有禮厚賂之成公十三年公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王王以為介而重賄之此本一事傳文異辭傳遂兩處說之耳國語記宣伯與獻子事其文加詳襄公九年冬十月諸侯伐鄭云云門于剸門云云門于師之梁云云門于北門云云晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門程端學曰既伐鄭而同盟矣晉人亦言姑盟而退修德息師而來終必獲鄭矣無緣即於此時再伐鄭也啖助曰此誤重說也古史或有用周正者或有用夏正者故有兩月不同作傳者承二國舊史之文遂兩載之襄公二十六年宋大子痤美而狠合左師畏而惡之寺人惠牆伊戾為大子內師而無寵楚客聘于晉過宋大子請野享之伊戾請從至則欿用牲加書徴之而騁告公曰大子將為亂既與楚客盟矣問諸夫人與左師則皆曰固聞之公囚大子云云乃縊而死佐為大子昭公六年宋寺人栁有寵大子佐惡之華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣公使視之有焉遂逐華合比合比奔衛於是華亥欲代右師從而為之徴曰聞之久矣公使代之案此兩寺人皆當平公之世皆坎用牲埋書以譖人皆有一人為之徴事絶相類疑亦有交互而混亂者二十七年齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也二十八年慶封來奔獻車於季武子美澤可以鑑展莊叔曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封汜祭穆子不說使工為之誦茅鴟亦不知此一慶封耳車美而見譏也食而不敬也賦詩而不知也何其同也蓋本一事重說耳昭公十二年鄭簡公卒將為葬除及游氏之廟將毁焉子大叔使其除徒執用以立而無庸毁曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子産乃使辟之十八年鄭子産為火故簡兵大搜將為搜除子大叔之廟在道南其寢在道北使除徒陳於道南廟北曰子産過女而命速除乃毁於而向子産朝過而怒之除者南毁子産及衝使從者止之曰毁於北方劉敞曰此兩傳實一事也魯鄭異國說者不同或謂葬時事或謂搜時事而左氏則兩記之何以明其然耶其忸忕小數而不知已非子大叔事也前既不忍毁以為惠矣俄而又自隳之亦非子産事也三十二年冬十一月晉魏舒合諸侯之大夫于狄泉尋盟且令城成周魏子南面衛彪傒曰魏子必有大咎干位以令大事非其任也定公元年春王正月晉魏舒合諸侯之大夫于狄泉將以城成周魏子蒞政衛彪傒曰將建天子而易位以令非義也大事奸義必有大咎魏子其不免乎啖助曰此重說也一本用夏正一本用周正以此誤也據前已言魏子南面彪傒譏之此又重言與前不異故知必重也左傳附注後録

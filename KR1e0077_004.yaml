body:
  text: 左傳附注卷四明陸粲撰孔氏正義凡不與杜注相附而自為說者具此春秋序和帝元興十一年鄭興父子及歆創通大義奏上左氏始得立學遂行於世至章帝時賈逵上春秋大義四十條王應麟曰考和帝元興止一年安得有十一年一誤也鄭興子衆終於章帝建初八年不及和帝時二誤也章帝之子為和帝先後失序三誤也釋文序録亦云元樂寸一年皆非是隱公元年虢叔死焉虢叔封西虢仲封東而杜云虢叔東虢君者言所滅之君字叔也皇甫謐帝王世紀以西虢為仲羅泌國名記亦謂虢仲封西虢叔封東云賈逵虞翻等謂叔為西虢仲為東虢誤也今案孔說既與虞賈同僖五年疏復云二虢不知誰是仲後誰是叔後然則孔亦未有定見也吳仁傑曰傳稱虢仲者即仲之後稱虢叔者即叔之後如趙盾字孟而其後皆稱趙孟耳天子七月而葬同軌畢至同軌同盟至者謂遣使來至非諸侯身至釋例曰萬國之數至衆封疆之守至重故天王之喪諸侯不得越竟而奔修服於其國卿共弔葬魯侯無故而穆伯如周弔此天子崩諸侯遣卿共弔葬之經傳也釋例之說非是先儒嘗辨之其引穆伯事蓋春秋時所行非周禮則然也三年立穆公其子饗之命以義夫穆公命立殤公出於仁義之中故杜云命出於義也命以義夫直謂宣公耳弗納於邪驕奢淫泆所自邪也服䖍云言此四者過從邪起是也自由也林堯叟曰此四者邪之所從來是也莊公六年人將不食吾餘為甥設享而因享害之所有餘食更為人設之將賤吾不肯復食噉也言自害其甥將為人所賤不肯噉吾餘食耳孔即指言所享之食斯為固矣十年衣食所安弗敢專也必以分人公意衣食二者雖所以安身然亦不敢專已有之必以分人言於衣食之美身口所便安者弗敢專享必以分人猶云所嘗者卒乘與焉十四年人棄常則妖興棄常謂既不能彊又不能弱失常度也此直言人棄其常德則故興猶云乖氣致異耳二十二年遇觀之否劉炫云觀之否者為觀卦之否爻屯之比者為屯卦之比爻皆不取後卦之義今知不然者以畢萬筮仕遇屯之比晉獻公筮嫁伯姬得歸妹之睽叔孫莊叔得明夷之謙皆取前後二卦以占吉凶故賈服及杜皆同焉劉炫苟異前儒好為别見非也傳中諸言筮得某卦之某有兼論後卦之義者上所陳三卦之類是也有專論本卦之義者昭七年孔成子得屯之比十二年南蒯得黃裳元吉之類是也皆由筮者臨時取義所以不同不容以執一論劉說未可非也閔公二年告之以臨民教之以軍旅里克謂太子還曲沃告百姓以臨示下民之事并教之以軍旅之法里克曉太子言父使汝居曲沃是告之以臨民也又使將下軍是教之以軍旅也孔說大謬且曰告百姓以臨示下民尤不成義理僖公二十四年夫袪猶在彼時斬袪之恨今日猶在言被斬之袪猶在也二十六年展禽其人氏展名獲字禽栁下是其所食之邑名諡曰惠莊子云栁下季者季是五十字禽是二十字古人雖云幼名冠字五十以伯仲然亦不盡然如孔子字仲尼其子字伯魚子路亦稱季路豈必是五十方制此字蓋伯仲叔季亦當時之通稱栁下季猶云隨季屏季耳二十七年鞭七人貫三人耳耳助句也程大昌曰軍法以矢貫耳為聅說文引司馬法曰小罪聅中罪刖大罪剄子玉蓋用此法如孔說以耳為助句則言貫三人者何所貫也二十八年我曲楚直其衆素飽素訓為空忿怒之深空腹不食直氣盈飽林堯叟曰言其衆直氣盈飽有素也如楚致其師致其師者致其鄭國之師許以佐楚也戰時雖無鄭師要本心佐楚故既敗而懼致其師者致楚師也據戰時無鄭師可知何煩曲說文公二年周志有之勇則害上不登於明堂謂之周志明是周世之書不知其書何名也此語今見逸周書大匡解尊僖公且明見曰吾見新鬼大故鬼小且明見者既尊崇僖公且明言其意之所見明見者明言其目之所見也君子以為失禮此下盡先姑以來皆是一君子之辭耳引詩二文於詩之下各言君子者謂作詩之人此論事君子又引作詩君子以為證傳中言君子者皆左氏假設評論之辭安有論事作詩之别注述若此一何煩猥七年殺公孫固公孫鄭于公宫僖二十二年傳稱大司馬固於時又有司馬子魚上文樂豫為司馬下云六卿和公室六卿之外有此二子蓋是孤卿之官宋是上公禮得有孤且春秋時不必如禮是時諸國間有大師大傅少師則孤卿也大司馬特僣王朝夏官之號耳十二年褁糧坐甲甲者所以制禦非常臨敵則被之於身未戰且坐之於地林堯叟曰謂戰士被甲不得復臥坐而待敵也十五年魯人以為敏魯人魯鈍之人魯人謂魯國人耳孔以杜注云君子所不與故為此解以求合注意亦固矣宣公三年夢天使與已蘭此既言天使與已蘭即云余為伯倏倏即非天也伯倏不得自稱為天天不得變為伯倏叔孫穆子夢天壓已弗勝豎牛助而勝之若是上天之神寧當與豎牛爭力而不勝也明皆夢者恍惚之言或别有邪神夢者不識而妄稱天耳夢者見其狀曰天使聞其言曰伯倏二者初不相妨記事立文體自當然豈謂伯倏自稱為天天變為伯倏哉叔孫夢天壓已弗勝非夢天神也何云與豎牛爭力蓋誤讀勝為勝負之勝耳勝音如升任也堪也此等竒怪猥瑣本不足設疑而喋喋言之荀卿所謂無用之辨孔君當之矣十二年夷於九縣楚滅諸國見於傳者申息鄧權弦黃夔江六蓼庸凡十一國言九縣者蘇氏沈氏以權是小國庸先屬楚自外為九也釋文之說亦與此同然九縣不可知必求其數以實之則鑿矣楊用修曰九為陽數之極書傳凡稱九者皆極言之耳後漢書云九縣颷回正用此語使孔穎逹輩訓釋之又指何地以充其數乎耆昧也不云攻昧而言耆昧者以汋詩之意言養紂而不言伐紂故緣詩之意言致之於昧然後攻之杜注言致討於昧不云致之於昧也致昧攻昧文雖小異義則一耳川壅為澤說卦坎為溝瀆溝瀆即是川也謂溝瀆為川甚謬使溝瀆而變為澤即當言通不當言壅矣說卦自云坎為水以水訓川豈不明白易見乎果遇必敗果敢遇敵必致禍敗言果能遇敵必敗耳藍縷方言楚謂凡人貧衣破醜敝為藍縷服䖍云言其縷破藍藍然說文懢楚謂無緣衣也此作藍蓋借用耳服謂藍藍然者似無所據使其徒入之使已從人入壘以取俘馘趙旃之如楚軍請召盟耳非致師也何俘馘之取鄭石制實入楚師入楚師言入此楚師於鄭國服䖍云使楚師來入鄭是也入楚師者直謂往詣楚師耳十四年與之言魯樂樂謂樂居髙位也言魯國風土可樂也十七年過而不改而又久之以成其悔晏桓子等懼晉之命不得己而來恨齊侯之使也今晉不以禮待之又久執之以成其悔恨言本恨齊今又恨晉也傳上文但言三子忠於齊國犯難而來不言其恨齊也此蓋言三子被執齊人必有悔遣使來之心或將背晉是成其悔也成公二年禮之如侯伯克敵使大夫告慶之禮降於卿禮一等如侯伯克敵使大夫告慶之禮則不得依獻捷之禮鞏朔晉之上軍大夫縱使得如獻捷之禮亦當降禮一等傳言云云以見王待鞏朔不失常也晉人獻捷非禮王當讓而不受今以克敵告慶之禮禮之蓋畏晉而然傳意正見其違常制云不失常非也九年南冠應劭漢官儀云法冠一曰柱後冠左傳南冠而縶則楚冠也秦滅楚以其冠賜近臣御史服之即今獬豸冠也後漢輿服志引胡廣說亦如此然傳云南冠未知其是何等冠也故杜注惟云楚冠而已應胡之說皆未然十二年郤至將登金奏作於下驚而走出子反曰云云卒聞地下鐘聲出其不意故驚而走出其出實為驚怖因即飾辭辭樂匿其驚走之意案下文郤至言兩君相見何以代此又范文子言無禮必食言則是地室縣樂實非使臣所敢當故驚走而辭之非飾辭也郤至豈兒女子而怖鐘聲乎天下有道則公侯能為民干城而制其腹心有道之時則公侯能為扞城禦難而使武夫制其已之腹心制其腹心謂制御武夫之為腹心者非使武夫制其已之腹心也十八年以塞夷庚夷平也詩序云由庚萬物得由其道是以庚為道也夷庚謂平道耳杜注謂夷庚吳晉往來之要道似是地名詩序言得由其道者猶云得循其性耳與此義不類然陸內史辨亡論有云旋皇輿於夷庚注引繁欽辨惑吳人者以船楫為輿馬巨海為夷庚又臧榮緒晉書夷庚未入乘輿旅館蓋皆指為道路而孔不能援以為證何耶成霸安疆自宋始矣謂文公成霸安疆自宋為始言今宋有患不可不救也成霸安疆直就悼公今日而言安得逺指文公也襄公二年諸姜宗婦諸姜是齊同姓之女嫁與齊大夫為妻者也注云同姓大夫之婦則非姜姓之女也蓋言諸姜之宗婦耳非異人任寡人也楚君被射目者非是為異人也任此患者為寡人也非異人任為句此以任字下屬非也五年殺人以逞逞訓解也共王殺此三人望解已意逞快也殺人以快已意六年司城子罕曰同罪異罰非刑也亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初亦逐子蕩一句亦是子罕之語言亦宜逐子蕩也子蕩恐即被逐故射子罕之門宋人不復更逐故子罕善之如初或當實逐子蕩故子蕩云幾日而不我從理亦通也亦逐子蕩是實逐之但子蕩彊悍未肯出奔而射子罕之門也復說義勝七年夫郊祀后稷以祈農事也杜注言后稷周之始祖能播殖者辨知后稷是何人不為能播殖故祀以祈農事也案孝經及郊特牲公羊傳云云據此諸文則郊祭天者為物本於天故祭天以報本神必須配故推祖以配天止報生成之恩非求未來之福此傳言郊祀后稷主為祈農事者祭為明神所享神以將來致福意雖不祈其實以祭獲福即祈之義也孔氏此論亦善然非傳與杜注本㫖也傳明言郊祀后稷以祈農市故杜亦云能播殖者以見其為農而祈也即如孔說欲辨知后稷為何人則言周之始祖足矣無為加播殖之文也啓蟄而郊郊而後耕今既耕而卜郊宜其不從也釋例曰僖公襄公夏四月卜郊但譏其非所宜卜不譏其四月不可郊也孟獻子曰啓蟄而郊郊而後耕謂春分也言得啓蟄即當卜郊不得過春分也此卜在春分之後故譏之傳言啓蟄而郊足明四月不得郊矣獻子此言非直譏其卜之遲實咎其郊之晚也注介助也景大也定本介景皆為大也介景皆大於文為重宜從初本十年刑放於寵刑罰放赦之事在於寵臣案杜注云寵臣專刑不任法則放者放縱之意非放赦也劉用熙曰放依也視寵臣之厚薄以加刑其說亦通十一年魏絳於是乎始有金石之樂禮也唯言有金石之樂不言女樂女樂房中私宴之樂或不以賜之晉語公賜魏絳女樂二八歌鍾一肆傳謂以樂之半賜之者此也孔失之不考十二年臨於周廟禮也杜云周廟文王廟也周公出文王故魯立其廟哀二年蒯聵禱云敢昭告皇祖文王是衛亦立文王廟也郊特牲曰諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也彼謂無功德非王命而輒自立之則為非禮魯衛有大功德王命立之是其正也鄭祖厲王亦然魯鄭立王廟皆非禮孔謂衛有大功德以王命立之者則未知康叔之勳於周公果若是班乎而成王之賜亦嘗及衛否也若蒯聵戰禱之辭乃其恐怖投車之餘如獸不擇音哀鳴而已寧可據為典言遂謂衛立文王廟乎斯謬甚矣十三年不猶愈乎方言云病差謂之愈後年注以愈為差此亦當為差也服䖍云愈猶病愈是愈為差之義也鄭𤣥論語注云愈猶勝也愈當如鄭義言差者迂矣十五年蒍子馮為大司馬案世本蒍艾獵是孫叔敖之兄馮是艾獵之子則馮是叔敖兄之子也杜集解及釋例皆以為艾獵叔敖為一人馮是叔敖之子世本轉寫多誤杜當考得其真案杜解云子馮叔敖從子未嘗言是叔敖之子也二十一年欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆如此傳則欒盈出奔之後宣子始殺十子如國語則先殺十子後逐欒盈與此異者賈逵云十子皆盈黨先為之作難討范氏不克而死然則欒盈城著十子在國宣子殺之乃使適著逐盈此傳先言盈後言其黨耳又此傳言城著而遂逐之國語言適曲沃逐欒盈者曲沃是欒氏采邑蓋就著逐其身適曲沃逐其家也國語記事多與傳異疏蓋屢言之哀十三年黃池之㑹下又引鄭𤣥說云國語非丘明所作凡共說一事而二文不同必國語虛而左傳實至此乃復强為牽合無乃自相戾乎書曰聖有謨勳此引夏書𦙍征之文也彼作聖有謨訓此云惠訓不倦行本當作訓但杜以傳作聖有謨勳故順傳文解之劉背傳文而規杜氏非也案傳所云惠訓不倦本上引詩惠我無疆而言於書謨訓之義自不相涉杜注甚明孔讀之不詳而誤為此論又不著劉說而直譏其非未知劉君所為規杜氏者何等語也疑其間有闕文二十三年公有姻喪王鮒使宣子墨縗冒絰姻喪注言夫人有杞喪鮒使宣子詐為夫人孝服也案盈之入在孝公葬後杜解諸侯既葬除服而夫人猶有服者葬杞孝公書於魯使去之日欒盈入晉當在葬孝公之前故夫人猶有服得詐為之也趙子常曰諸侯葬有書日者未必使行即書杜氏既葬除服之說據此傳亦其倍謬之一證孔氏曲為說通之過矣夫石猶生我服䖍云夫謂孟孫也夫發語辭傳固有謂彼人為夫者然此非其類也昭元年夫豈不愛孔云夫謂周公亦誤二十四年母寧使人謂子子實生我而謂子浚我以生乎言人等作二事為不取人財寧使人謂子實能生養我民也為多取人財使人言子須我民財以生活乎此二者孰勝也朱申曰言寧可使人議論子實能生養我者而孰謂子乃反取我財以自生乎此說是也干寶晉紀論百姓皆知上德之生已而不謂浚已以生也正用此意二十五年列國一同周法大國五百里此為一同者引夏殷時國小以譏晉國之寬大權以拒晉耳言大國五百里蓋据周禮為說然孟子云公侯皆方百里乃復與此傳一同之言合古制散絶傳聞各異未容以彼廢此此謂子産逺引夏殷時制以拒晉人非也諸儒說禮記凡與周禮不同者輒云夏殷之制共失自鄭𤣥以來則然矣二十七年賞罰無章章明也章猶條也言賞罰失當不成條理也志誣其上而公怨之以為賓榮伯有不臣被公怨怒自須掩蓋而賦詩道公無良反將公之所怨以為賓之榮寵公怨猶云公言之矣劉炫所謂顯然將比來之怨以為報賓之榮寵者是也二十八年在外不得宰吾一邑宰猶益也以弼殿為外也言吾先有邑更不得益弼殿耳言已若亡在外則雖欲主宰吾一邑亦不可得故下云恐失富也孔說迂謬且以宰為益此訓亦未之前聞二十九年王事靡盬昭元年傳曰於文皿蟲為蠱榖之飛亦為蠱蠱是蟲之害物故為不牢固也蠱與監音同義異斯說謬矣見舞象簫南籥者杜云皆文王之樂則象簫與南籥各是一舞南籥既是文舞則象簫當是武舞也南在簫籥之間則二者共有南義既云象簫南籥各是一舞又云南在簫籥之間二者共有南義前後相乖矣其前說是也君侈而多良謂多以惡人為良而善之傳文云君侈而多良大夫皆富政將在家言國多良大夫而此大夫又皆富必厚施而得政也此解謬甚三十年有與疑年使之年有與同食者問此老人之年不告以實疑其年也使之年者更使言其真年也林堯叟曰有與者將有所賜與也疑年者見其老故疑其年也而廢其輿尉杜云以役孤老故知者上云無子是孤年七十三是老也無子曰獨安得為孤注連言孤老亦以圓文耳其君弱植周禮謂草木為植物植為樹立君志弱不樹立也弱植者言其孱弱僅植立如草木而已三十一年館如公寢言往前文公之客館如今日晉君之路寢言客館如公路寢足矣往前今日字可刪不吾叛也謂尹何也劉炫云叛違也欲令子産不於我有違得使尹何為邑前說是劉炫說非也夫亦愈知治矣病差謂之愈言不能之病愈知治必速也愈猶益也言自此益知治矣令尹似君矣服䖍云言令尹動作以君儀故云以君矣明年傳曰二執戈者前矣是用君儀也俗本作似君若云似君不須言矣今定本亦作似君恐非作以君義迂宜從定本昭公元年不寧唯是不寧寧也言寧有唯是之事言寧唯此而已吾儕偷食儕等也言吾等於彼卑賤苟且飲食之人也吾儕趙孟自謂猶申叔云吾儕小人也言吾等無逺慮苟且飲食而已孔氏緣下文有儕於𨽻人之語遂為此解非也造舟于河詩云造舟為梁蓋造為至義言船相至而並比也相至義迂案詩朱傳云造作也音才早反為五陳以相離相離者布置使相逺也離麗也言相麗著也節宣其氣以時節宣散其氣也節者為之節度非時節也非羇何忌忌敬也言非是羇客何須敬之此言非羇之忌當誰忌也二年見易象與魯春秋曰周禮盡在魯矣此二書晉國亦應有之韓子舊應經見而至魯始歎之者因味義而善其人非為素不見也案易象之文固諸國所有若春秋則魯史也然國語稱羊舌肸習於春秋則諸國亦應有之但據韓子云吾乃今知周公之德與周之所以玉也則是素不曾見故杜注謂諸國多闕唯魯備宣子適魯而說之孔不尋傳文與杜義而苟生異見非也易象春秋皆周禮杜注但解春秋云云蓋易象本是周家之書無庸解釋也孔亦不能發此意四年王曰吾用齊桓服䖍云召陵之役齊桓退舍以禮楚靈王今感其意是以用之王以齊桓為霸者之盛故用其禮耳以為感召陵之退舍亦迂甚矣哉五年難易有備言知楚為患難則吳易有防備也難易有備猶言緩急有備耳難讀如字六年注見鄭伯如見楚王言棄疾共而有禮見如見王共也辭不敢見是禮也共而有禮杜注但就見如見王而言其文義甚明不必强為分析七年二卦皆云謂前卜元之二卦非謂後卜縶之卦也孔成子初筮立元得屯後筮立縶得屯之比屯卦辭及初九爻辭皆為利建侯故曰二卦皆云傳文及杜注甚明孔何所見為此謬說且初筮元之卦惟屯而已安得有二乎九年我在伯父猶衣服之有冠冕木水之有本原民人之有謀生也言我周存在於伯父有益如衣服云云言周為晉宗主故取譬於此三者非謂其有益也十年宋平公諡法內外賓服曰平諡法內外賓服曰正十二年我有圃生之杞乎圃者所以殖菜疏也杞非可食之物我有圃生之杞以喻南蒯在費欲為亂也徐鍇曰枸杞多生荒域坂岸之上圃生杞言非其宜此說與杜注會是也杜注亦云杞生於園圃非宜也又本草諸書多言杞能益夀何謂非可食之物也十三年子母勤言子母以見使為勤勞子躬降服請罪故王曰子母勤以慰謝之猶云大夫無辱再㑹而盟以顯昭明十二年而為一盟者大明黜陟之法諸侯之有明德表顯升進之於此盟以光顯諸侯有昭明之德者上文云有威而不昭共則不明故此覆說上意云顯其昭明非謂光顯諸侯也諸侯若討其可瀆乎言諸侯若來討鄭其可不由子輕易晉乎案杜注瀆易也又云慢也言諸侯若討鄭其可慢易之乎十五年然而前知其為人之異也然此朝吳於事必豫前知其為人有異於餘人林堯叟曰無極言豈不欲善吳然而豫知其多權謀有異於衆故去之也孔謂朝吳於事能前知謬矣十七年天子失官學在四夷猶信郯中國而習於夷者若杞夏之後而即東夷者十八年吾身泯焉弗良及也良是語辭史傳多云良所未悟良有以也而服䖍云弗良及者不能及也能非良之訓妄言耳良善也猶良食之良弗良及者言今將死不能平善以及彼時耳史傳所云良所未悟良有以也之類此良猶甚也亦非語辭服說固謬孔義亦未為得也十九年禳之則彼其室也言禳之則彼淵是其室也其室既近禳之不難言今欲禳之則彼淵是龍之室乃其所宜居耳無以禳為也二十年城父人服䖍云城父人城父大夫也城父人猶絳縣人武城人之類耳九年傳云遷城父人於陳遷方城外人於許據彼文益知非大夫矣山林之木衡鹿守之澤之萑蒲舟鮫守之言公立此官使之守掌專山澤之利不與民共故鬼神怒而加病也此但言齊君之政惡以取民怨耳何謂鬼神怒而加病乎二十一年吾小人可藉死而不能送亡君請待之服䖍以君上屬孫育以君下屬杜注不明亦似上屬杜注云請君待復戰決勝負是明以君下屬矣宜從孫育讀二十二年若華氏知困而致死楚耻無功而疾戰非吾利也若華氏知困而致死戰或敗諸侯之師也楚恥無功而疾戰戰勝則楚獨有功二者並非吾諸侯之利華氏致死楚人疾戰二者皆能敗諸侯之師故云非吾利也豈為與楚爭功哉二十六年白晢鬒鬚眉甚口甚口大口也劉用熙曰甚口有口才也今案上言失弓而罵故此言甚口猶史記云有口也玩求無度玩俗本作規服王孫皆注云玩貪也元年傳玩嵗而愒日杜云玩愒皆貪也則此言貪求無限度作規謬也作玩義短宜作規規計度也猶圖也玩愒皆貪也解亦非是說見前卷二十七年令尹炮之令尹炮之一句是鄢將師令衆之辭服䖍云民弗肯爇鄢將師稱令尹使汝燔炮之傳言令尹炮之盡滅郤氏之族黨義自了然而無故以異說亂之猶有鬼神此必敗也言尚有鬼神以助君此戰必當敗也况無鬼神乎襄二十年傳猶有鬼神吾有餒而已文義與此同言若有鬼神此戰必敗明其為鬼神所不祐也二十九年社稷五祀是尊是奉句芒祝融等五者本為五行之神作名耳非與重熙之徒為名也但配者與之同食故亦得取彼神名以為配猶社本土神稷本榖神而配者亦得稱社稷也趙子常曰傳云木正曰句芒又云使重為句芒以下皆然又云世不失職則五者亦是黨時官名非為配食故得取所配神名以為稱也定公元年季孫使役如闞公氏將溝焉闞是先公墓地氏猶言家故謂公之墓地為公氏言是公死之家宅也𤣥卿以為闞屬上句公氏將溝焉猶言將溝公氏焉古人多倒語公氏則昭公也公氏宜屬上句前說是𤣥卿之說非也四年命以伯禽公羊傳曰周公曷為不之魯欲天下之一乎周也其意言周公聖人若使之魯則恐天下回心向之故不使之魯也此何休解公羊傳之謬說也孔氏取之其識亦陋矣九年中牟有臣瓉者不知其姓或云姓傅作漢書音義云案河南中牟云云案水經注云薛瓉注漢書非姓傅也哀公二年敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛無絶筋無折骨謂軍之士衆無令傷損以成大事大命不敢請者謂已之身命不敢私請折筋絶骨皆蒯聵自謂非為士衆也大命不敢請國語作死不敢請韋昭注云言不敢請者歸之神也三年召正常正常不反服䖍云召而問兒死意然兒於正常去後始死非正常得知召之復何所問也當欲問不立康子之意故正常畏康子不反此康子既殺兒而召正常以弭衆言或當魯君自以正常無罪出奔故召之耳若不立康子之意則南孺子之男自是適子當立何用更問乎十七年衛侯貞卜其繇曰如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰劉炫以為卜繇之辭文句相韻裔焉二字宜向下讀之知不然者詩之為體其語助之辭皆在韻句之下即俟我於著乎而其樂只且之類是也此之方羊與下句將亡為韻裔焉二字為助句之辭繇辭之例未必皆韻此云闔門塞竇乃自後踰不與將亡為韻又一薰一蕕十年尚猶有臭不與攘公之羭為韻是或韻或不韻理無定準劉云云非也按竇字亦作窬音豆一音臾許氏說文引圭竇作圭窬是二字通也此塞竇宜音臾與踰為韻其上二句以羊亡自為韻如孔所引專之渝攘公之羭一薰一蕕十年尚猶有臭亦是以渝與羭蕕與臭各自為韻古詩辭如此比者多矣孔謂裔焉二字為語助可也謂繇辭或韻或不韻理無定準非也左傳附注卷四
